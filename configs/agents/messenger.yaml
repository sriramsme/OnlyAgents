agent:
  id: "user.assistant.messenger"
  name: "PersonalAssistant"
  role: "Messenger. Assistant to manage communication, schedule, and tasks."
  max_concurrency: 10
  buffer_size: 100

logging:
  level: "info"  # debug, info, warn, error
  format: "text"  # text, json

security:
  key_path: "./keys/agent.key"
  credentials_path: "./credentials"

llm:
  provider: "openai"  # anthropic, openai, gemini
  model: "gpt-5-nano"
  api_key_vault: "llm/openai/api_key"  # or "${vault:llm/openai/api_key}"
  base_url: ""  # Optional, for custom endpoints
  options:
    max_tokens: "4096"
    temperature: "0.7"

skills:
  - name: "calendar"
    enabled: true
    config:
      provider: "google"

  - name: "email"
    enabled: true
    config:
      provider: "gmail"

connectors: []

platforms:
  - name: "google"
    type: "oauth2"
    enabled: true
    credentials:
      client_id: "${GOOGLE_CLIENT_ID}"
      client_secret: "${GOOGLE_CLIENT_SECRET}"
