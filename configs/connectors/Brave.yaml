# Brave Search Connector Configuration

name: brave_search
platform: brave
enabled: false
max_results: 5  # Default number of results

credentials:
  # This is a vault key - actual secret stored in vault
  api_key: "BRAVE_API_KEY"

# Get your Brave Search API key from: https://brave.com/search/api/
# Store it in your vault (e.g., .env file):
# BRAVE_API_KEY=your_actual_api_key_here
