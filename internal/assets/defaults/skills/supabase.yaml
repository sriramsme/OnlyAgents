name: supabase
type: cli
enabled: false
access_level: admin
description: >
  Supabase project management — local development stack, database migrations,
  edge functions, secrets, and type generation.
capabilities:
  - project_management
  - database_migrations
  - edge_functions
  - secrets_management
version: 1.0.0
instructions: |
  supabase CLI must be installed and available on PATH.
  Authenticate by setting SUPABASE_ACCESS_TOKEN in ~/.onlyagents/.env, or run
  supabase login interactively before use.
  Most commands operate in a project directory containing a supabase/ folder.
  Pass working_dir to target a specific project root.
  Remote operations require the project to be linked first — use supabase_link.
requires:
  bins:
    - name: supabase
      install:
        brew: brew install supabase/tap/supabase
        manual: https://supabase.com/docs/guides/cli/getting-started
  env:
    - SUPABASE_ACCESS_TOKEN

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  supabase_project: "Manage local and remote projects — init, start, stop, status, link, and list"
  supabase_db: "Database migrations and schema operations — diff, push, reset, and dump"
  supabase_functions: "Edge function lifecycle — scaffold, deploy, delete, list, and serve locally"
  supabase_secrets: "Manage project secrets — set, list, and unset environment variables"
  supabase_gen: "Generate type definitions from the database schema"
  supabase_passthrough: "Escape hatch — run any supabase CLI command not covered by named tools"

executor:
  max_output_size: 102400
  max_execution_time: 600
  missing_bin_behavior: error

_params:
  working_dir: &working_dir
    name: working_dir
    type: string
  project_ref: &project_ref
    name: project_ref
    type: string

tools:

  # ── PROJECT ────────────────────────────────────────────────────────────────

  - name: supabase_projects_list
    group: supabase_project
    access: read
    exec:
      command: supabase
      args: ["projects", "list"]

  - name: supabase_init
    group: supabase_project
    access: write
    exec:
      command: supabase
      args: ["init", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir

  - name: supabase_link
    group: supabase_project
    access: write
    exec:
      command: supabase
      args: ["link", "--project-ref", "{{project_ref}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref

  - name: supabase_start
    group: supabase_project
    access: write
    exec:
      command: supabase
      args: ["start", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir

  - name: supabase_stop
    group: supabase_project
    access: write
    exec:
      command: supabase
      args: ["stop", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir

  - name: supabase_status
    group: supabase_project
    access: read
    exec:
      command: supabase
      args: ["status", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir

  # ── DB ─────────────────────────────────────────────────────────────────────

  - name: supabase_migration_new
    group: supabase_db
    access: write
    exec:
      command: supabase
      args: ["migration", "new", "{{name}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: name
        type: string

  - name: supabase_migration_list
    group: supabase_db
    access: read
    exec:
      command: supabase
      args: ["migration", "list", "--project-ref", "{{project_ref}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref

  - name: supabase_db_push
    group: supabase_db
    access: write
    exec:
      command: supabase
      args: ["db", "push", "--project-ref", "{{project_ref}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref

  - name: supabase_db_diff
    group: supabase_db
    access: read
    exec:
      command: supabase
      args: ["db", "diff", "--project-ref", "{{project_ref}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref

  - name: supabase_db_reset
    group: supabase_db
    access: admin
    exec:
      command: supabase
      args: ["db", "reset", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
    validation:
      require_confirm: true

  - name: supabase_db_dump
    group: supabase_db
    access: read
    exec:
      command: supabase
      args: ["db", "dump", "--project-ref", "{{project_ref}}", "--file", "{{output_file}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref
      - name: output_file
        type: string

  # ── FUNCTIONS ──────────────────────────────────────────────────────────────

  - name: supabase_functions_list
    group: supabase_functions
    access: read
    exec:
      command: supabase
      args: ["functions", "list", "--project-ref", "{{project_ref}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref

  - name: supabase_functions_new
    group: supabase_functions
    access: write
    exec:
      command: supabase
      args: ["functions", "new", "{{name}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: name
        type: string

  - name: supabase_functions_deploy
    group: supabase_functions
    access: write
    exec:
      command: supabase
      args: ["functions", "deploy", "{{name}}", "--project-ref", "{{project_ref}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref
      - name: name
        type: string

  - name: supabase_functions_delete
    group: supabase_functions
    access: admin
    exec:
      command: supabase
      args: ["functions", "delete", "{{name}}", "--project-ref", "{{project_ref}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref
      - name: name
        type: string
    validation:
      require_confirm: true

  - name: supabase_functions_serve
    group: supabase_functions
    access: write
    exec:
      command: supabase
      args: ["functions", "serve", "{{name}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: name
        type: string

  # ── SECRETS ────────────────────────────────────────────────────────────────

  - name: supabase_secrets_list
    group: supabase_secrets
    access: read
    exec:
      command: supabase
      args: ["secrets", "list", "--project-ref", "{{project_ref}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref

  - name: supabase_secrets_set
    group: supabase_secrets
    access: write
    exec:
      command: supabase
      args: ["secrets", "set", "{{secrets}}", "--project-ref", "{{project_ref}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref
      - name: secrets
        type: string

  - name: supabase_secrets_unset
    group: supabase_secrets
    access: admin
    exec:
      command: supabase
      args: ["secrets", "unset", "{{keys}}", "--project-ref", "{{project_ref}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref
      - name: keys
        type: string
    validation:
      require_confirm: true

  # ── GEN ────────────────────────────────────────────────────────────────────

  - name: supabase_gen_types
    group: supabase_gen
    access: read
    exec:
      command: supabase
      args: ["gen", "types", "typescript", "--project-ref", "{{project_ref}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - *project_ref

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: supabase_passthrough
    group: supabase_passthrough
    access: admin
    exec:
      command: supabase
      args: ["{{args}}", "--workdir", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: args
        type: string
    validation:
      require_confirm: true
