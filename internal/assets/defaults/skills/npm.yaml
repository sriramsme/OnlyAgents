name: npm
type: cli
enabled: false
access_level: write
description: >
  Node.js package management and script execution — install dependencies,
  run project scripts, audit for vulnerabilities, and publish packages.
capabilities:
  - package_management
  - script_runner
  - dependency_auditing
version: 1.0.0
instructions: |
  npm must be installed and available on PATH. It ships with Node.js.
  All tools accept a working_dir param — the directory containing package.json.
  Defaults to current working directory.
requires:
  bins:
    - name: npm
      install:
        brew: brew install node
        apt: sudo apt install nodejs npm
        manual: https://nodejs.org/en/download/

groups:
  npm_project: "Initialize and inspect the project — init, list installed packages, and view package info"
  npm_packages: "Add, remove, and update dependencies — install, uninstall, update, and outdated"
  npm_scripts: "Run and list scripts defined in package.json"
  npm_audit: "Check for vulnerabilities and fix them"
  npm_passthrough: "Escape hatch — run any npm command not covered by named tools"

_params:
  working_dir: &working_dir
    name: working_dir
    type: string
    description: Directory containing package.json. Leave empty for current working directory.
    default: ""

tools:

  # ── PROJECT ────────────────────────────────────────────────────────────────

  - name: npm_init
    description: Initialize a new Node.js project.
    group: npm_project
    access: write
    timeout: 15
    exec:
      command: npm
      args: ["init", "{{flags}}"]
    parameters:
      - *working_dir
      - name: flags
        type: string
        description: e.g. "--yes --prefix ./app"
        default: "--yes"

  - name: npm_list
    description: List installed packages and their versions.
    group: npm_project
    access: read
    timeout: 15
    exec:
      command: npm
      args: ["list", "--depth={{depth}}", "{{prefix_flag}}", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: depth
        type: integer
        default: 0
      - name: prefix_flag
        type: string
        description: Use "--prefix" when working_dir is set
        default: ""

  - name: npm_info
    description: Show metadata for a package from the npm registry.
    group: npm_project
    access: read
    timeout: 15
    exec:
      command: npm
      args: ["info", "{{package}}"]
    parameters:
      - name: package
        type: string

  # ── PACKAGES ───────────────────────────────────────────────────────────────

  - name: npm_install
    description: Install dependencies or specific packages.
    group: npm_packages
    access: write
    timeout: 120
    exec:
      command: npm
      args: ["install", "{{packages}}", "{{flags}}", "{{prefix_flag}}", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: packages
        type: string
        default: ""
      - name: flags
        type: string
        description: "eg '--save-dev --save-exact'"
        default: ""
      - name: prefix_flag
        type: string
        description: "'--prefix' when working_dir is set"
        default: ""

  - name: npm_uninstall
    description: Remove packages.
    group: npm_packages
    access: write
    timeout: 30
    exec:
      command: npm
      args: ["uninstall", "{{packages}}", "{{prefix_flag}}", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: packages
        type: string
      - name: prefix_flag
        type: string
        default: ""

  - name: npm_update
    description: Update packages.
    group: npm_packages
    access: write
    timeout: 120
    exec:
      command: npm
      args: ["update", "{{packages}}", "{{prefix_flag}}", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: packages
        type: string
        default: ""
      - name: prefix_flag
        type: string
        default: ""

  - name: npm_outdated
    description: List outdated packages.
    group: npm_packages
    access: read
    timeout: 30
    exec:
      command: npm
      args: ["outdated", "{{prefix_flag}}", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: prefix_flag
        type: string
        default: ""

  # ── SCRIPTS ────────────────────────────────────────────────────────────────

  - name: npm_run
    description: Run a script from package.json.
    group: npm_scripts
    access: write
    timeout: 300
    exec:
      command: npm
      args: ["run", "{{script}}", "{{prefix_flag}}", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: script
        type: string
      - name: prefix_flag
        type: string
        default: ""

  - name: npm_run_list
    description: List all scripts.
    group: npm_scripts
    access: read
    timeout: 10
    exec:
      command: npm
      args: ["run", "{{prefix_flag}}", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: prefix_flag
        type: string
        default: ""

  # ── AUDIT ──────────────────────────────────────────────────────────────────

  - name: npm_audit
    description: Check for vulnerabilities.
    group: npm_audit
    access: read
    timeout: 30
    exec:
      command: npm
      args: ["audit", "{{prefix_flag}}", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: prefix_flag
        type: string
        default: ""

  - name: npm_audit_fix
    description: Fix vulnerabilities.
    group: npm_audit
    access: write
    timeout: 120
    exec:
      command: npm
      args: ["audit", "fix", "{{flags}}", "{{prefix_flag}}", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: flags
        type: string
        description: e.g. "--force"
        default: ""
      - name: prefix_flag
        type: string
        default: ""

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: npm_passthrough
    description: Run arbitrary npm command.
    group: npm_passthrough
    access: write
    timeout: 300
    exec:
      command: npm
      args: ["{{args}}", "{{prefix_flag}}", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: args
        type: string
      - name: prefix_flag
        type: string
        default: ""
    validation:
      max_output_size: 102400
      require_confirm: true
