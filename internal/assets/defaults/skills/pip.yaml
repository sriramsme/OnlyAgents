name: pip
type: cli
enabled: false
access_level: write
description: >
  Python package management — install, remove, and inspect packages,
  manage requirements files, and check environment health.
capabilities:
  - package_management
  - dependency_management
version: 1.0.0
instructions: |
  pip3 must be installed and available on PATH. It ships with Python 3.
  Use virtual environments to isolate project dependencies — activate the venv
  before running these tools, or pass the venv's pip path via pip_bin.
  All tools use pip3 by default. Override with pip_bin for venv or pip paths.
requires:
  bins:
    - name: pip3
      install:
        brew: brew install python
        apt: sudo apt install python3-pip
        manual: https://pip.pypa.io/en/stable/installation/

groups:
  pip_packages: "Install, upgrade, and remove packages"
  pip_inspect: "List installed packages, show metadata, and check environment health"
  pip_freeze: "Export and install from requirements files"
  pip_passthrough: "Escape hatch — run any pip command not covered by named tools"

_params:
  pip_bin: &pip_bin
    name: pip_bin
    type: string
    description: Path to pip binary to use. Leave empty to use pip3 from PATH.
    default: "pip3"

tools:

  # ── PACKAGES ───────────────────────────────────────────────────────────────

  - name: pip_install
    description: Install one or more packages.
    group: pip_packages
    access: write
    timeout: 120
    exec:
      command: "{{pip_bin}}"
      args: ["install", "{{flags}}", "{{packages}}"]
    parameters:
      - *pip_bin
      - name: packages
        type: string
      - name: flags
        type: string
        description: e.g. "--upgrade"
        default: ""

  - name: pip_uninstall
    description: Remove one or more installed packages.
    group: pip_packages
    access: write
    timeout: 30
    exec:
      command: "{{pip_bin}}"
      args: ["uninstall", "--yes", "{{packages}}"]
    parameters:
      - *pip_bin
      - name: packages
        type: string

  # ── INSPECT ────────────────────────────────────────────────────────────────

  - name: pip_list
    description: List installed packages.
    group: pip_inspect
    access: read
    timeout: 15
    exec:
      command: "{{pip_bin}}"
      args: ["list", "{{flags}}"]
    parameters:
      - *pip_bin
      - name: flags
        type: string
        description: e.g. "--outdated"
        default: ""

  - name: pip_show
    description: Show metadata for an installed package.
    group: pip_inspect
    access: read
    timeout: 10
    exec:
      command: "{{pip_bin}}"
      args: ["show", "{{package}}"]
    parameters:
      - *pip_bin
      - name: package
        type: string

  - name: pip_check
    description: Verify installed packages have compatible dependencies.
    group: pip_inspect
    access: read
    timeout: 15
    exec:
      command: "{{pip_bin}}"
      args: ["check"]
    parameters:
      - *pip_bin

  # ── FREEZE ─────────────────────────────────────────────────────────────────

  - name: pip_freeze
    description: Output installed packages in requirements format.
    group: pip_freeze
    access: read
    timeout: 10
    exec:
      command: "{{pip_bin}}"
      args: ["freeze"]
    parameters:
      - *pip_bin

  - name: pip_install_requirements
    description: Install packages from a requirements file.
    group: pip_freeze
    access: write
    timeout: 120
    exec:
      command: "{{pip_bin}}"
      args: ["install", "-r", "{{requirements_file}}"]
    parameters:
      - *pip_bin
      - name: requirements_file
        type: string

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: pip_passthrough
    description: Run arbitrary pip command.
    group: pip_passthrough
    access: write
    timeout: 120
    exec:
      command: "{{pip_bin}}"
      args: ["{{args}}"]
    parameters:
      - *pip_bin
      - name: args
        type: string
    validation:
      max_output_size: 102400
      require_confirm: true
