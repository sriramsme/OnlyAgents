name: psql
type: cli
enabled: false
access_level: admin
description: >
  PostgreSQL database operations — inspecting schemas, running queries, managing
  databases and roles, and dumping or restoring data.
capabilities:
  - database_query
  - schema_inspection
  - database_management
version: 1.0.0
instructions: |
  psql, pg_dump, and pg_restore must be installed and available on PATH.
  Connection is controlled by the connection_string param (e.g. postgresql://user:pass@host:5432/dbname).
  Leave connection_string empty to use PGHOST, PGPORT, PGUSER, PGPASSWORD, and PGDATABASE env vars.
  Destructive tools (psql_manage group) require confirmation before execution.
requires:
  bins:
    - name: psql
      install:
        brew: brew install libpq
        apt: sudo apt install postgresql-client
        manual: https://www.postgresql.org/download/
    - name: pg_dump
      install:
        brew: brew install libpq
        apt: sudo apt install postgresql-client
        manual: https://www.postgresql.org/download/
    - name: pg_restore
      install:
        brew: brew install libpq
        apt: sudo apt install postgresql-client
        manual: https://www.postgresql.org/download/

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  psql_inspect: "Explore database structure — list databases, schemas, tables, columns, indexes, and constraints"
  psql_query: "Run read-only SQL queries and explain query plans"
  psql_write: "Execute data-modifying SQL — INSERT, UPDATE, DELETE, and DDL statements"
  psql_manage: "Create and drop databases and roles — destructive and irreversible"
  psql_dump: "Dump and restore databases and individual tables"
  psql_passthrough: "Escape hatch — run any psql invocation not covered by named tools"

executor:
  max_output_size: 102400
  max_execution_time: 300
  missing_bin_behavior: error

_params:
  connection_string: &connection_string
    name: connection_string
    type: string
    description: PostgreSQL connection string
    default: ""

tools:

  # ── INSPECT ────────────────────────────────────────────────────────────────

  - name: psql_list_databases
    group: psql_inspect
    access: read
    timeout: 10
    exec:
      command: psql
      args: ["{{connection_string}}", "-c", "\\l+", "--no-password"]
    parameters:
      - *connection_string

  - name: psql_list_tables
    group: psql_inspect
    access: read
    timeout: 10
    exec:
      command: psql
      args:
        - "{{connection_string}}"
        - "-c"
        - "SELECT schemaname, tablename, pg_size_pretty(pg_total_relation_size(schemaname||'.'||tablename)) AS size, n_live_tup AS approx_rows FROM pg_stat_user_tables WHERE schemaname = '{{schema}}' ORDER BY pg_total_relation_size(schemaname||'.'||tablename) DESC;"
        - "--no-password"
    parameters:
      - *connection_string
      - name: schema
        type: string

  - name: psql_describe_table
    group: psql_inspect
    access: read
    timeout: 10
    exec:
      command: psql
      args: ["{{connection_string}}", "-c", "\\d+ {{schema}}.{{table}}", "--no-password"]
    parameters:
      - *connection_string
      - name: schema
        type: string
      - name: table
        type: string

  - name: psql_list_indexes
    group: psql_inspect
    access: read
    timeout: 10
    exec:
      command: psql
      args:
        - "{{connection_string}}"
        - "-c"
        - "SELECT indexname, indexdef, pg_size_pretty(pg_relation_size(indexname::regclass)) AS size FROM pg_indexes WHERE schemaname = '{{schema}}' AND tablename = '{{table}}' ORDER BY pg_relation_size(indexname::regclass) DESC;"
        - "--no-password"
    parameters:
      - *connection_string
      - name: schema
        type: string
      - name: table
        type: string

  - name: psql_list_functions
    group: psql_inspect
    access: read
    timeout: 10
    exec:
      command: psql
      args:
        - "{{connection_string}}"
        - "-c"
        - "SELECT routine_name, routine_type, data_type AS return_type FROM information_schema.routines WHERE routine_schema = '{{schema}}' ORDER BY routine_name;"
        - "--no-password"
    parameters:
      - *connection_string
      - name: schema
        type: string

  - name: psql_active_connections
    group: psql_inspect
    access: read
    timeout: 10
    exec:
      command: psql
      args:
        - "{{connection_string}}"
        - "-c"
        - "SELECT pid, datname, usename, application_name, client_addr, state, LEFT(query, 80) AS query, query_start FROM pg_stat_activity WHERE state != 'idle' ORDER BY query_start;"
        - "--no-password"
    parameters:
      - *connection_string

  # ── QUERY ──────────────────────────────────────────────────────────────────

  - name: psql_query
    group: psql_query
    access: read
    timeout: 30
    exec:
      command: psql
      args:
        - "{{connection_string}}"
        - "-c"
        - "BEGIN; SET TRANSACTION READ ONLY; {{sql}} COMMIT;"
        - "--no-password"
    parameters:
      - *connection_string
      - name: sql
        type: string

  - name: psql_explain
    group: psql_query
    access: read
    timeout: 30
    exec:
      command: psql
      args:
        - "{{connection_string}}"
        - "-c"
        - "EXPLAIN {{sql}};"
        - "--no-password"
    parameters:
      - *connection_string
      - name: sql
        type: string

  # ── WRITE ──────────────────────────────────────────────────────────────────

  - name: psql_execute
    group: psql_write
    access: write
    timeout: 60
    exec:
      command: psql
      args: ["{{connection_string}}", "-c", "{{sql}}", "--no-password"]
    parameters:
      - *connection_string
      - name: sql
        type: string

  - name: psql_run_file
    group: psql_write
    access: write
    timeout: 120
    exec:
      command: psql
      args: ["{{connection_string}}", "-f", "{{file}}", "--no-password"]
    parameters:
      - *connection_string
      - name: file
        type: string

  # ── MANAGE ─────────────────────────────────────────────────────────────────

  - name: psql_create_database
    group: psql_manage
    access: admin
    timeout: 15
    exec:
      command: psql
      args:
        - "{{connection_string}}"
        - "-c"
        - "CREATE DATABASE {{dbname}};"
        - "--no-password"
    parameters:
      - *connection_string
      - name: dbname
        type: string
    validation:
      require_confirm: true

  - name: psql_drop_database
    group: psql_manage
    access: admin
    timeout: 15
    exec:
      command: psql
      args:
        - "{{connection_string}}"
        - "-c"
        - "DROP DATABASE IF EXISTS {{dbname}};"
        - "--no-password"
    parameters:
      - *connection_string
      - name: dbname
        type: string
    validation:
      require_confirm: true

  - name: psql_create_role
    group: psql_manage
    access: admin
    timeout: 15
    exec:
      command: psql
      args:
        - "{{connection_string}}"
        - "-c"
        - "CREATE ROLE {{rolename}};"
        - "--no-password"
    parameters:
      - *connection_string
      - name: rolename
        type: string
    validation:
      require_confirm: true

  # ── DUMP ───────────────────────────────────────────────────────────────────

  - name: psql_dump
    group: psql_dump
    access: read
    timeout: 300
    exec:
      command: pg_dump
      args:
        - "{{connection_string}}"
        - "--format=custom"
        - "--file={{output_file}}"
        - "--no-password"
    parameters:
      - *connection_string
      - name: output_file
        type: string
    validation:
      require_confirm: true

  - name: psql_restore
    group: psql_dump
    access: admin
    timeout: 300
    exec:
      command: pg_restore
      args:
        - "{{connection_string}}"
        - "--format=custom"
        - "{{input_file}}"
        - "--no-password"
    parameters:
      - *connection_string
      - name: input_file
        type: string
    validation:
      require_confirm: true

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: psql_passthrough
    group: psql_passthrough
    access: admin
    timeout: 60
    exec:
      command: psql
      args: ["{{connection_string}}", "{{args}}", "--no-password"]
    parameters:
      - *connection_string
      - name: args
        type: string
    validation:
      require_confirm: true
