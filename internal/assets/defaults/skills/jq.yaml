name: jq
type: cli
enabled: false
access_level: read
description: >
  JSON querying and transformation — extract fields, filter and search arrays,
  reshape objects, and format output for downstream tools.
capabilities:
  - json_processing
  - data_extraction
  - data_transformation
version: 1.0.0
instructions: |
  jq must be installed and available on PATH.
  All tools accept an input_file param. Leave empty to read from stdin.
  Filters follow standard jq syntax — see https://jqlang.org/manual/ for reference.
requires:
  bins:
    - name: jq
      install:
        brew: brew install jq
        apt: sudo apt install jq
        manual: https://jqlang.org/download/

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  jq_inspect: "Read and explore JSON structure — pretty-print, list keys, check types, measure length"
  jq_extract: "Extract fields by path, filter arrays by condition, and search by regex"
  jq_transform: "Reshape JSON — map, pick fields, sort, group, and deduplicate arrays"
  jq_format: "Format output for downstream use — CSV, TSV, and raw string extraction"
  jq_passthrough: "Escape hatch — run any jq filter expression not covered by named tools"

_params:
  input_file: &input_file
    name: input_file
    type: string
    description: Path to a JSON file. Leave empty to read from stdin.
    default: ""

tools:

  # ── INSPECT ────────────────────────────────────────────────────────────────

  - name: jq_pretty
    description: Pretty-print a JSON file or stdin with optional top-level filter.
    group: jq_inspect
    access: read
    timeout: 10
    exec:
      command: jq
      args: ["{{filter}}", "{{input_file}}"]
    parameters:
      - *input_file
      - name: filter
        type: string
        default: "."

  - name: jq_keys
    description: List keys of an object or count elements of an array.
    group: jq_inspect
    access: read
    timeout: 10
    exec:
      command: jq
      args: ['{{path}} | if type == "array" then length else keys end', "{{input_file}}"]
    parameters:
      - *input_file
      - name: path
        type: string
        default: "."

  - name: jq_type
    description: Show JSON type of root or nested path.
    group: jq_inspect
    access: read
    timeout: 10
    exec:
      command: jq
      args: ['{{path}} | type', "{{input_file}}"]
    parameters:
      - *input_file
      - name: path
        type: string
        default: "."

  # ── EXTRACT ────────────────────────────────────────────────────────────────

  - name: jq_get
    description: Extract a field or nested path.
    group: jq_extract
    access: read
    timeout: 10
    exec:
      command: jq
      args: ["{{filter}}", "{{input_file}}"]
    parameters:
      - *input_file
      - name: filter
        type: string

  - name: jq_select
    description: Filter array elements by condition.
    group: jq_extract
    access: read
    timeout: 10
    exec:
      command: jq
      args: ["{{filter}}", "{{input_file}}"]
    parameters:
      - *input_file
      - name: filter
        type: string

  - name: jq_search
    description: Filter array elements using regex match.
    group: jq_extract
    access: read
    timeout: 10
    exec:
      command: jq
      args: ['[.[] | select(.{{field}} | tostring | test("{{pattern}}"))]', "{{input_file}}"]
    parameters:
      - *input_file
      - name: field
        type: string
      - name: pattern
        type: string

  # ── TRANSFORM ──────────────────────────────────────────────────────────────

  - name: jq_map
    description: Apply expression to each array element.
    group: jq_transform
    access: read
    timeout: 10
    exec:
      command: jq
      args: ['[.[] | {{expr}}]', "{{input_file}}"]
    parameters:
      - *input_file
      - name: expr
        type: string

  - name: jq_pick
    description: Extract subset of fields from array objects.
    group: jq_transform
    access: read
    timeout: 10
    exec:
      command: jq
      args: ['[.[] | { {{fields}} }]', "{{input_file}}"]
    parameters:
      - *input_file
      - name: fields
        type: string

  - name: jq_sort
    description: Sort array by field expression.
    group: jq_transform
    access: read
    timeout: 10
    exec:
      command: jq
      args: ["{{filter}}", "{{input_file}}"]
    parameters:
      - *input_file
      - name: filter
        type: string

  - name: jq_group
    description: Group array elements by field.
    group: jq_transform
    access: read
    timeout: 10
    exec:
      command: jq
      args: ['group_by(.{{field}}) | map({(.[0].{{field}} | tostring): .}) | add', "{{input_file}}"]
    parameters:
      - *input_file
      - name: field
        type: string

  - name: jq_unique
    description: Deduplicate array elements by field.
    group: jq_transform
    access: read
    timeout: 10
    exec:
      command: jq
      args: ['unique_by(.{{field}})', "{{input_file}}"]
    parameters:
      - *input_file
      - name: field
        type: string

  # ── FORMAT ─────────────────────────────────────────────────────────────────

  - name: jq_to_table
    description: Convert array of objects to CSV/TSV.
    group: jq_format
    access: read
    timeout: 10
    exec:
      command: jq
      args: ["-r", "{{filter}}", "{{input_file}}"]
    parameters:
      - *input_file
      - name: filter
        type: string

  - name: jq_raw
    description: Extract raw string values.
    group: jq_format
    access: read
    timeout: 10
    exec:
      command: jq
      args: ["-r", "{{filter}}", "{{input_file}}"]
    parameters:
      - *input_file
      - name: filter
        type: string

  - name: jq_compact
    description: Output compact JSON.
    group: jq_format
    access: read
    timeout: 10
    exec:
      command: jq
      args: ["-c", "{{filter}}", "{{input_file}}"]
    parameters:
      - *input_file
      - name: filter
        type: string
        default: "."

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: jq_passthrough
    description: Run arbitrary jq expression.
    group: jq_passthrough
    access: read
    timeout: 30
    exec:
      command: jq
      args: ["{{options}}", "{{filter}}", "{{input_file}}"]
    parameters:
      - *input_file
      - name: filter
        type: string
      - name: options
        type: string
        default: ""
