name: vercel
type: cli
enabled: false
access_level: admin
description: >
  Vercel project deployment and management — local dev server, deployments,
  environment variables, domains, and logs.
capabilities:
  - frontend_deployment
  - serverless_deployment
  - domain_management
version: 1.0.0
instructions: |
  vercel CLI must be installed and available on PATH.
  Authenticate by setting VERCEL_TOKEN in ~/.onlyagents/.env for non-interactive use.
  Most commands operate in a project directory containing a vercel.json or recognized framework config.
  Pass working_dir to target a specific project root.
  Link the project with vercel_link before running env or domain commands.
requires:
  bins:
    - name: vercel
      install:
        brew: brew install vercel-cli
        manual: https://vercel.com/docs/cli
  env:
    - VERCEL_TOKEN

groups:
  vercel_project: "Initialize and link projects — init, link, list projects, and inspect deployments"
  vercel_deploy: "Deploy to production or preview — dev server, deploy, and promote"
  vercel_env: "Manage environment variables — list, add, remove, and pull to local .env"
  vercel_domains: "Manage custom domains — list, add, remove, and inspect DNS"
  vercel_passthrough: "Escape hatch — run any vercel CLI command not covered by named tools"

executor:
  max_output_size: 102400
  max_execution_time: 600
  missing_bin_behavior: error

_params:
  working_dir: &working_dir
    name: working_dir
    type: string
  scope: &scope
    name: scope
    type: string

tools:

  # ── PROJECT ────────────────────────────────────────────────────────────────

  - name: vercel_list
    group: vercel_project
    access: read
    exec:
      command: vercel
      args: ["list", "--scope", "{{scope}}", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *scope

  - name: vercel_link
    group: vercel_project
    access: write
    exec:
      command: vercel
      args: ["link", "--yes", "--project", "{{project}}", "--scope", "{{scope}}", "--cwd", "{{working_dir}}", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *working_dir
      - *scope
      - name: project
        type: string

  - name: vercel_inspect
    group: vercel_project
    access: read
    exec:
      command: vercel
      args: ["inspect", "{{url}}", "--scope", "{{scope}}", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *scope
      - name: url
        type: string

  # ── DEPLOY ─────────────────────────────────────────────────────────────────

  - name: vercel_dev
    group: vercel_deploy
    access: write
    timeout: 600
    exec:
      command: vercel
      args: ["dev", "--listen", "{{port}}", "--cwd", "{{working_dir}}", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *working_dir
      - name: port
        type: string

  - name: vercel_deploy
    group: vercel_deploy
    access: write
    timeout: 300
    exec:
      command: vercel
      args: ["deploy", "--scope", "{{scope}}", "--cwd", "{{working_dir}}", "--yes", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *working_dir
      - *scope

  - name: vercel_promote
    group: vercel_deploy
    access: write
    exec:
      command: vercel
      args: ["promote", "{{url}}", "--scope", "{{scope}}", "--yes", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *scope
      - name: url
        type: string

  - name: vercel_rollback
    group: vercel_deploy
    access: write
    exec:
      command: vercel
      args: ["rollback", "{{url}}", "--scope", "{{scope}}", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *scope
      - name: url
        type: string

  # ── ENV ────────────────────────────────────────────────────────────────────

  - name: vercel_env_list
    group: vercel_env
    access: read
    exec:
      command: vercel
      args: ["env", "ls", "{{environment}}", "--scope", "{{scope}}", "--cwd", "{{working_dir}}", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *working_dir
      - *scope
      - name: environment
        type: string

  - name: vercel_env_add
    group: vercel_env
    access: write
    exec:
      command: vercel
      args: ["env", "add", "{{key}}", "{{environment}}", "--scope", "{{scope}}", "--cwd", "{{working_dir}}", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *working_dir
      - *scope
      - name: key
        type: string
      - name: environment
        type: string

  - name: vercel_env_remove
    group: vercel_env
    access: admin
    exec:
      command: vercel
      args: ["env", "rm", "{{key}}", "{{environment}}", "--scope", "{{scope}}", "--yes", "--cwd", "{{working_dir}}", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *working_dir
      - *scope
      - name: key
        type: string
      - name: environment
        type: string
    validation:
      require_confirm: true

  - name: vercel_env_pull
    group: vercel_env
    access: read
    exec:
      command: vercel
      args: ["env", "pull", "{{output_file}}", "--scope", "{{scope}}", "--cwd", "{{working_dir}}", "--yes", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *working_dir
      - *scope
      - name: output_file
        type: string

  # ── DOMAINS ────────────────────────────────────────────────────────────────

  - name: vercel_domains_list
    group: vercel_domains
    access: read
    exec:
      command: vercel
      args: ["domains", "ls", "--scope", "{{scope}}", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *scope

  - name: vercel_domains_add
    group: vercel_domains
    access: write
    exec:
      command: vercel
      args: ["domains", "add", "{{domain}}", "--scope", "{{scope}}", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *scope
      - name: domain
        type: string

  - name: vercel_domains_remove
    group: vercel_domains
    access: admin
    exec:
      command: vercel
      args: ["domains", "rm", "{{domain}}", "--scope", "{{scope}}", "--yes", "--token", "$VERCEL_TOKEN"]
    parameters:
      - *scope
      - name: domain
        type: string
    validation:
      require_confirm: true

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: vercel_passthrough
    group: vercel_passthrough
    access: admin
    exec:
      command: vercel
      args: ["{{args}}", "--token", "$VERCEL_TOKEN", "--cwd", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: args
        type: string
    validation:
      require_confirm: true
