name: docker
type: cli
enabled: false
access_level: admin
description: >
  Docker container and image operations — inspecting running containers, managing
  images, building, running, and cleaning up. For Kubernetes orchestration use
  the kubectl skill instead.
capabilities:
  - containers
  - images
  - compose
  - container_inspection
version: 1.0.0
instructions: |
  docker must be installed and the daemon must be running.
  All tools operate on the local Docker context unless overridden via context param.
  Destructive tools (docker:lifecycle and docker:prune groups) require confirmation before execution.
  docker compose tools expect a compose file in the working directory or via compose_file param.
requires:
  bins:
    - name: docker
      install:
        brew: brew install --cask docker
        apt: sudo apt install docker.io
        manual: https://docs.docker.com/get-docker/

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  docker_inspect: "Read container and image state — ps, images, logs, stats, inspect, top, diff"
  docker_lifecycle: "Create, start, stop, restart, and remove containers"
  docker_images: "Build, tag, pull, push, and remove images"
  docker_compose: "Compose project operations — up, down, ps, logs, restart"
  docker_resources: "List and inspect Docker networks and volumes"
  docker_prune: "Remove stopped containers, unused images, and volumes — destructive"
  docker_passthrough: "Escape hatch — run any docker subcommand not covered by named tools"

tools:

  # ── INSPECT ────────────────────────────────────────────────────────────────

  - name: docker_ps
    description: List containers
    group: docker_inspect
    access: read
    exec:
      command: docker
      args: ["ps", "--all"]
    parameters: []

  - name: docker_images
    description: List local images
    group: docker_inspect
    access: read
    exec:
      command: docker
      args: ["images"]
    parameters: []

  - name: docker_logs
    description: Fetch logs from a container
    group: docker_inspect
    access: read
    exec:
      command: docker
      args: ["logs", "--tail", "{{tail}}", "{{container}}"]
    parameters:
      - name: container
        type: string
      - name: tail
        type: integer
        default: 100

  - name: docker_inspect
    description: Inspect container or image
    group: docker_inspect
    access: read
    exec:
      command: docker
      args: ["inspect", "{{target}}"]
    parameters:
      - name: target
        type: string

  # ── LIFECYCLE ──────────────────────────────────────────────────────────────

  - name: docker_start
    description: Start container
    group: docker_lifecycle
    access: write
    exec:
      command: docker
      args: ["start", "{{container}}"]
    parameters:
      - name: container
        type: string

  - name: docker_stop
    description: Stop container
    group: docker_lifecycle
    access: write
    exec:
      command: docker
      args: ["stop", "{{container}}"]
    parameters:
      - name: container
        type: string

  - name: docker_restart
    description: Restart container
    group: docker_lifecycle
    access: write
    exec:
      command: docker
      args: ["restart", "{{container}}"]
    parameters:
      - name: container
        type: string

  - name: docker_rm
    description: Remove container
    group: docker_lifecycle
    access: admin
    exec:
      command: docker
      args: ["rm", "{{container}}"]
    parameters:
      - name: container
        type: string
    validation:
      require_confirm: true

  - name: docker_run
    description: Run container from image
    group: docker_lifecycle
    access: write
    exec:
      command: docker
      args: ["run", "-d", "--name", "{{name}}", "{{image}}"]
    parameters:
      - name: image
        type: string
      - name: name
        type: string

  # ── IMAGES ─────────────────────────────────────────────────────────────────

  - name: docker_build
    description: Build image
    group: docker_images
    access: write
    exec:
      command: docker
      args: ["build", "-t", "{{tag}}", "{{context}}"]
    parameters:
      - name: tag
        type: string
      - name: context
        type: string
        default: "."

  - name: docker_pull
    description: Pull image
    group: docker_images
    access: write
    exec:
      command: docker
      args: ["pull", "{{image}}"]
    parameters:
      - name: image
        type: string

  - name: docker_push
    description: Push image
    group: docker_images
    access: write
    exec:
      command: docker
      args: ["push", "{{image}}"]
    parameters:
      - name: image
        type: string

  - name: docker_rmi
    description: Remove image
    group: docker_images
    access: admin
    exec:
      command: docker
      args: ["rmi", "{{image}}"]
    parameters:
      - name: image
        type: string
    validation:
      require_confirm: true

  # ── COMPOSE ────────────────────────────────────────────────────────────────

  - name: docker_compose_up
    description: Start services with docker compose
    group: docker_compose
    access: write
    exec:
      command: docker
      args: ["compose", "up", "-d"]
    parameters: []

  - name: docker_compose_down
    description: Stop compose services
    group: docker_compose
    access: admin
    exec:
      command: docker
      args: ["compose", "down"]
    parameters: []
    validation:
      require_confirm: true

  # ── RESOURCES ──────────────────────────────────────────────────────────────

  - name: docker_network_ls
    description: List networks
    group: docker_resources
    access: read
    exec:
      command: docker
      args: ["network", "ls"]
    parameters: []

  - name: docker_volume_ls
    description: List volumes
    group: docker_resources
    access: read
    exec:
      command: docker
      args: ["volume", "ls"]
    parameters: []

  # ── PRUNE ──────────────────────────────────────────────────────────────────

  - name: docker_system_df
    description: Show disk usage
    group: docker_prune
    access: read
    exec:
      command: docker
      args: ["system", "df"]
    parameters: []

  - name: docker_system_prune
    description: Remove unused resources
    group: docker_prune
    access: admin
    exec:
      command: docker
      args: ["system", "prune", "-f"]
    parameters: []
    validation:
      require_confirm: true

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: docker_passthrough
    description: Run arbitrary docker command
    group: docker_passthrough
    access: admin
    exec:
      command: docker
      args: ["{{args}}"]
    parameters:
      - name: args
        type: string
    validation:
      require_confirm: true
