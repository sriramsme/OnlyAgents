name: git
type: cli
enabled: false
access_level: read
description: >
  Local git operations for the full development lifecycle — inspecting history,
  branching, committing, syncing, and history rewriting. For GitHub-specific
  operations (PRs, issues, Actions) use the github skill instead.
capabilities:
  - git
  - version_control
  - branching
  - commit_history
  - history_rewriting
version: 2.0.0
instructions: |
  git must be installed and available on PATH.
  Every tool accepts repo_path (default: current working directory).
  OnlyAgents home dir is ~/.onlyagents/ — repos cloned there are in scope.
  History-rewriting tools (git:history group) require confirmation before execution.
requires:
  bins:
    - name: git
      install:
        brew: brew install git
        apt: sudo apt install git
        manual: https://git-scm.com/downloads

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# Planning step receives this manifest only. Backend injects tools per selected
# groups before the execution step.
# ─────────────────────────────────────────────────────────────────────────────
groups:
  git_inspect: "Read repo state — status, log, diff, blame, show, stash list, remotes, tags"
  git_branch: "Create, switch, and delete branches"
  git_commit: "Stage, commit, restore, revert, cherry-pick, merge"
  git_sync: "fetch, pull, push"
  git_stash: "Save, apply, pop, and drop stash entries"
  git_history: "Rebase, reset, amend — rewrites or discards history"
  git_passthrough: "Escape hatch — run any git subcommand not covered by named tools"

_params:
  repo_path: &repo_path
    name: repo_path
    type: string
    description: Absolute path to repo root
    default: "."

tools:

  # ── INSPECT ────────────────────────────────────────────────────────────────

  - name: git_status
    description: Show working tree status (short + branch)
    group: git_inspect
    access: read
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "status", "--short", "--branch"]
    parameters:
      - *repo_path

  - name: git_log_recent
    description: Show recent commits as graph
    group: git_inspect
    access: read
    exec:
      command: git
      args:
        - "-C"
        - "{{repo_path}}"
        - "log"
        - "--oneline"
        - "--decorate"
        - "--graph"
        - "--max-count"
        - "{{limit}}"
    parameters:
      - *repo_path
      - name: limit
        type: integer
        description: Number of commits
        default: 20

  - name: git_log_file
    description: Show commit history for a specific file
    group: git_inspect
    access: read
    exec:
      command: git
      args:
        - "-C"
        - "{{repo_path}}"
        - "log"
        - "--oneline"
        - "--"
        - "{{file}}"
    parameters:
      - *repo_path
      - name: file
        type: string

  - name: git_diff_working
    description: Show unstaged changes
    group: git_inspect
    access: read
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "diff"]

    parameters:
      - *repo_path

  - name: git_diff_staged
    description: Show staged changes
    group: git_inspect
    access: read
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "diff", "--cached"]
    parameters:
      - *repo_path

  - name: git_diff_range
    description: Compare two refs
    group: git_inspect
    access: read
    exec:
      command: git
      args:
        - "-C"
        - "{{repo_path}}"
        - "diff"
        - "{{range}}"
    parameters:
      - *repo_path
      - name: range
        type: string
        description: e.g. main...feature

  - name: git_show_commit
    description: Show commit details
    group: git_inspect
    access: read
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "show", "{{ref}}", "--stat"]
    parameters:
      - *repo_path
      - name: ref
        type: string

  # ── BRANCH ─────────────────────────────────────────────────────────────────

  - name: git_branch_list
    description: List branches (local)
    group: git_branch
    access: read
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "branch", "--sort=-committerdate"]
    parameters:
      - *repo_path

  - name: git_branch_list_all
    description: List all branches (including remote)
    group: git_branch
    access: read
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "branch", "--all"]
    parameters:
      - *repo_path

  - name: git_switch
    description: Switch to an existing branch
    group: git_branch
    access: write
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "switch", "{{branch}}"]
    parameters:
      - *repo_path
      - name: branch
        type: string

  - name: git_branch_create
    description: Create and switch to new branch
    group: git_branch
    access: write
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "switch", "-c", "{{branch}}"]
    parameters:
      - *repo_path
      - name: branch
        type: string

  - name: git_branch_delete
    description: Delete branch (safe)
    group: git_branch
    access: write
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "branch", "-d", "{{branch}}"]
    parameters:
      - *repo_path
      - name: branch
        type: string

  - name: git_branch_delete_force
    description: Force delete branch
    group: git_branch
    access: admin
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "branch", "-D", "{{branch}}"]
    parameters:
      - *repo_path
      - name: branch
        type: string
    validation:
      require_confirm: true

  # ── COMMIT ─────────────────────────────────────────────────────────────────

  - name: git_add
    description: Stage files
    group: git_commit
    access: write
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "add", "--", "{{paths}}"]
    parameters:
      - *repo_path
      - name: paths
        type: string

  - name: git_commit
    description: Create commit
    group: git_commit
    access: write
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "commit", "-m", "{{message}}"]
    parameters:
      - *repo_path
      - name: message
        type: string

  - name: git_commit_amend
    description: Amend last commit
    group: git_commit
    access: admin
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "commit", "--amend", "-m", "{{message}}"]
    parameters:
      - *repo_path
      - name: message
        type: string
    validation:
      require_confirm: true

  - name: git_restore_working
    description: Discard working tree changes
    group: git_commit
    access: write
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "restore", "--", "{{paths}}"]
    parameters:
      - *repo_path
      - name: paths
        type: string

  - name: git_restore_staged
    description: Unstage files
    group: git_commit
    access: write
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "restore", "--staged", "{{paths}}"]
    parameters:
      - *repo_path
      - name: paths
        type: string

  # ── SYNC ───────────────────────────────────────────────────────────────────

  - name: git_fetch
    description: Fetch from origin
    group: git_sync
    access: write
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "fetch", "origin", "--prune"]
    parameters:
      - *repo_path

  - name: git_pull
    description: Pull (rebase)
    group: git_sync
    access: write
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "pull", "--rebase"]
    parameters:
      - *repo_path

  - name: git_push
    description: Push current branch
    group: git_sync
    access: write
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "push"]
    parameters:
      - *repo_path

  - name: git_push_set_upstream
    description: Push and set upstream
    group: git_sync
    access: write
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "push", "-u", "origin", "{{branch}}"]
    parameters:
      - *repo_path
      - name: branch
        type: string

  # ── HISTORY (DESTRUCTIVE) ──────────────────────────────────────────────────

  - name: git_reset_hard
    description: Hard reset (destructive)
    group: git_history
    access: admin
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "reset", "--hard", "{{ref}}"]
    parameters:
      - *repo_path
      - name: ref
        type: string
    validation:
      require_confirm: true

  - name: git_rebase
    description: Rebase onto another branch
    group: git_history
    access: admin
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "rebase", "{{onto}}"]
    parameters:
      - *repo_path
      - name: onto
        type: string
    validation:
      require_confirm: true

  - name: git_push_force
    description: Force push with lease
    group: git_history
    access: admin
    exec:
      command: git
      args: ["-C", "{{repo_path}}", "push", "--force-with-lease"]
    parameters:
      - *repo_path
    validation:
      require_confirm: true
