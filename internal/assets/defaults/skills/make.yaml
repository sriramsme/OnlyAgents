name: make
type: cli
enabled: false
access_level: write
description: >
  Run and inspect Makefile targets — build, test, lint, and other project
  automation tasks defined in a project's Makefile.
capabilities:
  - build_automation
  - task_runner
version: 1.0.0
instructions: |
  make must be installed and available on PATH.
  All tools accept a working_dir param — the directory containing the Makefile.
  Defaults to current working directory.
  Long-running targets (build, test) use a 300s timeout by default.
requires:
  bins:
    - name: make
      install:
        brew: brew install make
        apt: sudo apt install make
        manual: https://www.gnu.org/software/make/

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  make_inspect: "Read and explore Makefile structure — list targets, preview commands without running them"
  make_run: "Execute Makefile targets"
  make_passthrough: "Escape hatch — run any make invocation not covered by named tools"

_params:
  working_dir: &working_dir
    name: working_dir
    type: string
    description: Directory containing the Makefile. Leave empty for current working directory.
    default: ""
  makefile: &makefile
    name: makefile
    type: string
    description: Path to a specific Makefile.
    default: ""
  jobs: &jobs
    name: jobs
    type: integer
    description: Number of parallel jobs.
    default: 1

tools:

  # ── INSPECT ────────────────────────────────────────────────────────────────

  - name: make_list_targets
    description: List documented targets in the Makefile.
    group: make_inspect
    access: read
    timeout: 10
    exec:
      command: sh
      args:
        [
          "-c",
          "grep -E '^[a-zA-Z0-9_-]+:.*?##' {{file}} | awk 'BEGIN {FS = \":.*?## \"} {printf \"%-20s %s\\n\", $1, $2}'"
        ]
    parameters:
      - *working_dir
      - *makefile
      - name: file
        type: string
        description: Path to Makefile (resolved externally)

  - name: make_dry_run
    description: Print commands a target would execute.
    group: make_inspect
    access: read
    timeout: 15
    exec:
      command: make
      args: ["-n", "{{target}}", "{{makefile_flag}}", "{{makefile}}", "{{dir_flag}}", "{{working_dir}}"]
    parameters:
      - name: target
        type: string
      - *working_dir
      - *makefile
      - name: makefile_flag
        type: string
        default: ""
      - name: dir_flag
        type: string
        default: ""

  - name: make_print_variable
    description: Print value of a Makefile variable.
    group: make_inspect
    access: read
    timeout: 10
    exec:
      command: sh
      args:
        [
          "-c",
          "make -p -f /dev/null {{file}} 2>/dev/null | grep -E '^{{variable}} :?='"
        ]
    parameters:
      - *working_dir
      - *makefile
      - name: variable
        type: string
      - name: file
        type: string

  # ── RUN ────────────────────────────────────────────────────────────────────

  - name: make_run
    description: Execute one or more Makefile targets.
    group: make_run
    access: write
    timeout: 300
    exec:
      command: make
      args:
        [
          "{{makefile_flag}}",
          "{{makefile}}",
          "{{dir_flag}}",
          "{{working_dir}}",
          "-j{{jobs}}",
          "{{targets}}",
          "{{variables}}"
        ]
    parameters:
      - name: targets
        type: string
      - *working_dir
      - *makefile
      - *jobs
      - name: variables
        type: string
        default: ""
      - name: makefile_flag
        type: string
        default: ""
      - name: dir_flag
        type: string
        default: ""

  - name: make_run_default
    description: Run default target.
    group: make_run
    access: write
    timeout: 300
    exec:
      command: make
      args:
        [
          "{{makefile_flag}}",
          "{{makefile}}",
          "{{dir_flag}}",
          "{{working_dir}}",
          "-j{{jobs}}"
        ]
    parameters:
      - *working_dir
      - *makefile
      - *jobs
      - name: makefile_flag
        type: string
        default: ""
      - name: dir_flag
        type: string
        default: ""

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: make_passthrough
    description: Run arbitrary make invocation.
    group: make_passthrough
    access: write
    timeout: 300
    exec:
      command: make
      args: ["{{args}}", "{{dir_flag}}", "{{working_dir}}"]
    parameters:
      - *working_dir
      - name: args
        type: string
      - name: dir_flag
        type: string
        default: ""
    validation:
      require_confirm: true
