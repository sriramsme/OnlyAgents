name: ripgrep
type: cli
enabled: false
access_level: read
description: >
  Fast code and text search across files and directories — pattern matching,
  file filtering, and structured output for agent-friendly consumption.
capabilities:
  - code_search
  - text_search
  - file_discovery
version: 1.0.0
instructions: |
  rg (ripgrep) must be installed and available on PATH.
  All tools accept a path param — a file, directory, or glob. Defaults to current working directory.
  ripgrep respects .gitignore and .rgignore files by default. Pass no_ignore=true to override.
requires:
  bins:
    - name: rg
      install:
        brew: brew install ripgrep
        apt: sudo apt install ripgrep
        manual: https://github.com/BurntSushi/ripgrep#installation

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  rg_search: "Search file contents by pattern — basic, case-insensitive, word-boundary, and multiline"
  rg_filter: "Scope search by file type, glob, or directory depth"
  rg_output: "Control output format — count only, filenames only, context lines, and JSON"
  rg_passthrough: "Escape hatch — run any rg invocation not covered by named tools"

_params:
  path: &path
    name: path
    type: string
    description: File, directory, or glob to search. Leave empty for current working directory.
    default: ""
  no_ignore: &no_ignore
    name: no_ignore
    type: boolean
    description: Ignore .gitignore and .rgignore rules and search all files.
    default: false
  hidden: &hidden
    name: hidden
    type: boolean
    description: Include hidden files and directories (dotfiles).
    default: false

tools:
  # ── SEARCH ─────────────────────────────────────────────────────────────────

  - name: rg_search
    description: Search for a pattern in files. The core tool — use this first. Supports fixed strings and regular expressions.
    group: rg_search
    access: read
    timeout: 30
    exec:
      command: rg
      args:
        - "{{#if fixed_string}}-F{{/if}}"
        - "{{#if ignore_case}}-i{{/if}}"
        - "{{#if no_ignore}}--no-ignore{{/if}}"
        - "{{#if hidden}}--hidden{{/if}}"
        - "{{pattern}}"
        - "{{path}}"
    parameters:
      - name: pattern
        type: string
        description: Search pattern — regex by default. Set fixed_string=true for a literal string match.
      - *path
      - name: ignore_case
        type: boolean
        description: Case-insensitive matching.
        default: false
      - name: fixed_string
        type: boolean
        description: Treat the pattern as a literal string, not a regular expression.
        default: false
      - *no_ignore
      - *hidden

  - name: rg_word
    description: Search for whole-word matches only.
    group: rg_search
    access: read
    timeout: 30
    exec:
      command: rg
      args:
        - "-w"
        - "{{#if ignore_case}}-i{{/if}}"
        - "{{#if no_ignore}}--no-ignore{{/if}}"
        - "{{#if hidden}}--hidden{{/if}}"
        - "{{pattern}}"
        - "{{path}}"
    parameters:
      - name: pattern
        type: string
        description: Word to search for.
      - *path
      - name: ignore_case
        type: boolean
        default: false
      - *no_ignore
      - *hidden

  - name: rg_multiline
    description: Search for patterns that span multiple lines.
    group: rg_search
    access: read
    timeout: 30
    exec:
      command: rg
      args:
        - "-U"
        - "{{#if ignore_case}}-i{{/if}}"
        - "{{#if no_ignore}}--no-ignore{{/if}}"
        - "{{#if hidden}}--hidden{{/if}}"
        - "{{pattern}}"
        - "{{path}}"
    parameters:
      - name: pattern
        type: string
      - *path
      - name: ignore_case
        type: boolean
        default: false
      - *no_ignore
      - *hidden

  # ── FILTER ─────────────────────────────────────────────────────────────────

  - name: rg_by_type
    group: rg_filter
    access: read
    timeout: 30
    exec:
      command: rg
      args:
        - "-t"
        - "{{file_type}}"
        - "{{#if ignore_case}}-i{{/if}}"
        - "{{#if no_ignore}}--no-ignore{{/if}}"
        - "{{#if hidden}}--hidden{{/if}}"
        - "{{pattern}}"
        - "{{path}}"
    parameters:
      - name: pattern
        type: string
      - name: file_type
        type: string
      - *path
      - name: ignore_case
        type: boolean
        default: false
      - *no_ignore
      - *hidden

  - name: rg_by_glob
    group: rg_filter
    access: read
    timeout: 30
    exec:
      command: rg
      args:
        - "-g"
        - "{{glob}}"
        - "{{#if ignore_case}}-i{{/if}}"
        - "{{#if no_ignore}}--no-ignore{{/if}}"
        - "{{#if hidden}}--hidden{{/if}}"
        - "{{pattern}}"
        - "{{path}}"
    parameters:
      - name: pattern
        type: string
      - name: glob
        type: string
      - *path
      - name: ignore_case
        type: boolean
        default: false
      - *no_ignore
      - *hidden

  # ── OUTPUT ─────────────────────────────────────────────────────────────────

  - name: rg_count
    group: rg_output
    access: read
    timeout: 30
    exec:
      command: rg
      args:
        - "-c"
        - "{{#if ignore_case}}-i{{/if}}"
        - "{{#if no_ignore}}--no-ignore{{/if}}"
        - "{{#if hidden}}--hidden{{/if}}"
        - "{{#if file_type}}-t{{/if}}"
        - "{{file_type}}"
        - "{{pattern}}"
        - "{{path}}"
    parameters:
      - name: pattern
        type: string
      - *path
      - name: ignore_case
        type: boolean
        default: false
      - name: file_type
        type: string
        default: ""
      - *no_ignore
      - *hidden

  - name: rg_files
    group: rg_output
    access: read
    timeout: 30
    exec:
      command: rg
      args:
        - "-l"
        - "{{#if ignore_case}}-i{{/if}}"
        - "{{#if no_ignore}}--no-ignore{{/if}}"
        - "{{#if hidden}}--hidden{{/if}}"
        - "{{#if file_type}}-t{{/if}}"
        - "{{file_type}}"
        - "{{pattern}}"
        - "{{path}}"
    parameters:
      - name: pattern
        type: string
      - *path
      - name: ignore_case
        type: boolean
        default: false
      - name: file_type
        type: string
        default: ""
      - *no_ignore
      - *hidden

  - name: rg_context
    group: rg_output
    access: read
    timeout: 30
    exec:
      command: rg
      args:
        - "-C"
        - "{{context_lines}}"
        - "{{#if ignore_case}}-i{{/if}}"
        - "{{#if no_ignore}}--no-ignore{{/if}}"
        - "{{#if hidden}}--hidden{{/if}}"
        - "{{#if file_type}}-t{{/if}}"
        - "{{file_type}}"
        - "{{pattern}}"
        - "{{path}}"
    parameters:
      - name: pattern
        type: string
      - *path
      - name: context_lines
        type: integer
        default: 3
      - name: ignore_case
        type: boolean
        default: false
      - name: file_type
        type: string
        default: ""
      - *no_ignore
      - *hidden

  - name: rg_json
    group: rg_output
    access: read
    timeout: 30
    exec:
      command: rg
      args:
        - "--json"
        - "{{#if ignore_case}}-i{{/if}}"
        - "{{#if no_ignore}}--no-ignore{{/if}}"
        - "{{#if hidden}}--hidden{{/if}}"
        - "{{#if file_type}}-t{{/if}}"
        - "{{file_type}}"
        - "{{pattern}}"
        - "{{path}}"
    parameters:
      - name: pattern
        type: string
      - *path
      - name: ignore_case
        type: boolean
        default: false
      - name: file_type
        type: string
        default: ""
      - *no_ignore
      - *hidden

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: rg_passthrough
    group: rg_passthrough
    access: read
    timeout: 60
    exec:
      command: rg
      args:
        - "{{args}}"
    parameters:
      - name: args
        type: string
