name: github
type: cli
enabled: false
access_level: write
description: >
  Interact with GitHub using the gh CLI. Covers the full remote development
  lifecycle: pull requests, issues, CI/CD, releases, repo management, and
  search. For local git operations use the git skill instead.
capabilities:
  - github
  - repository_management
  - ci_cd
  - issue_tracking
  - pull_requests
  - releases
  - code_search
  - workflow_automation
version: 2.0.0
instructions: |
  1. Install the GitHub CLI: https://cli.github.com
  2. Set GITHUB_TOKEN in ~/.onlyagents/.env
     Get a token at: https://github.com/settings/tokens
     Required scopes: repo, read:org, workflow
  3. Verify setup: gh auth status
requires:
  bins:
    - name: gh
      install:
        brew: brew install gh
        apt: sudo apt install gh
        manual: https://cli.github.com
  env:
    - GITHUB_TOKEN

executor:
  max_output_size: 102400
  max_execution_time: 600
  missing_bin_behavior: error

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  gh_pr_read: "List, view, diff, and inspect PRs, their checks, reviews, and comments"
  gh_pr_write: "Create, merge, approve, request changes, comment, and close PRs"
  gh_issue: "List, view, create, comment, close, and reopen issues"
  gh_ci: "List, view, and rerun workflow runs; view failure logs"
  gh_workflow: "List, trigger, enable, and disable workflows"
  gh_release: "List, view, and create releases"
  gh_repo: "View, list, clone, and fork repositories"
  gh_search: "Search repos, issues, PRs, and code across GitHub"
  gh_passthrough: "Escape hatch — call any GitHub REST endpoint via gh api"


# ─────────────────────────────────────────────────────────────────────────────
# COMMON PARAMS
# ─────────────────────────────────────────────────────────────────────────────
_params:
  repo: &repo
    name: repo
    type: string
    description: Repository in owner/repo format

  pr_id: &pr_id
    name: pr_id
    type: integer

  issue_id: &issue_id
    name: issue_id
    type: integer

  run_id: &run_id
    name: run_id
    type: string


# ─────────────────────────────────────────────────────────────────────────────
# TOOLS
# ─────────────────────────────────────────────────────────────────────────────
tools:

# ── PR: READ ────────────────────────────────────────────────────────────────

  - name: gh_pr_list
    description: List pull requests with metadata and filters
    group: gh_pr_read
    access: read
    timeout: 10
    command: >
      gh pr list --repo {{repo}} --state {{state}} --limit {{limit}}
      --json number,title,author,state,headRefName,labels,isDraft
    parameters:
      - *repo
      - name: state
        type: string
        default: open
      - name: limit
        type: integer
        default: 20

  - name: gh_pr_view
    description: Get full pull request details including CI and mergeability
    group: gh_pr_read
    access: read
    timeout: 10
    command: >
      gh pr view {{pr_id}} --repo {{repo}}
      --json number,title,body,state,author,labels,mergeable,isDraft,
             headRefName,baseRefName,url,statusCheckRollup,reviews
    parameters:
      - *repo
      - *pr_id

  - name: gh_pr_diff
    description: Show unified diff for a pull request
    group: gh_pr_read
    access: read
    timeout: 30
    command: "gh pr diff {{pr_id}} --repo {{repo}}"
    parameters:
      - *repo
      - *pr_id

  - name: gh_pr_checks
    description: Get CI check results for a pull request
    group: gh_pr_read
    access: read
    timeout: 10
    command: "gh pr checks {{pr_id}} --repo {{repo}}"
    parameters:
      - *repo
      - *pr_id

# ── PR: WRITE ───────────────────────────────────────────────────────────────

  - name: gh_pr_create
    description: Create a new pull request
    group: gh_pr_write
    access: write
    timeout: 30
    command: >
      gh pr create --repo {{repo}}
      --title "{{title}}"
      --body "{{body}}"
      --base {{base}}
      --head {{head}}
    parameters:
      - *repo
      - name: title
        type: string
      - name: body
        type: string
      - name: base
        type: string
        default: main
      - name: head
        type: string
    validation:
      require_confirm: true

  - name: gh_pr_merge
    description: Merge a pull request and optionally delete the branch
    group: gh_pr_write
    access: write
    timeout: 30
    command: >
      gh pr merge {{pr_id}} --repo {{repo}}
      --{{strategy}} --delete-branch
    parameters:
      - *repo
      - *pr_id
      - name: strategy
        type: string
        default: squash
    validation:
      require_confirm: true

  - name: gh_pr_review
    description: Submit a review (approve, request changes, or comment)
    group: gh_pr_write
    access: write
    timeout: 15
    command: >
      gh pr review {{pr_id}} --repo {{repo}}
      {{action}} --body "{{body}}"
    parameters:
      - *repo
      - *pr_id
      - name: action
        type: string
      - name: body
        type: string
        default: ""
    validation:
      require_confirm: true

  - name: gh_pr_comment
    description: Add a comment to a pull request
    group: gh_pr_write
    access: write
    timeout: 15
    command: "gh pr comment {{pr_id}} --repo {{repo}} --body \"{{body}}\""
    parameters:
      - *repo
      - *pr_id
      - name: body
        type: string
    validation:
      require_confirm: true

  - name: gh_pr_update_state
    description: Close or reopen a pull request
    group: gh_pr_write
    access: write
    timeout: 10
    command: "gh pr {{action}} {{pr_id}} --repo {{repo}}"
    parameters:
      - *repo
      - *pr_id
      - name: action
        type: string
        description: close | reopen
    validation:
      require_confirm: true


# ── ISSUE ──────────────────────────────────────────────────────────────────

  - name: gh_issue_list
    description: List issues with metadata
    group: gh_issue
    access: read
    timeout: 10
    command: >
      gh issue list --repo {{repo}} --state {{state}} --limit {{limit}}
      --json number,title,state,author,labels,assignees,createdAt
    parameters:
      - *repo
      - name: state
        type: string
        default: open
      - name: limit
        type: integer
        default: 20

  - name: gh_issue_view
    description: Get full issue details including comments
    group: gh_issue
    access: read
    timeout: 10
    command: >
      gh issue view {{issue_id}} --repo {{repo}}
      --json number,title,body,state,author,labels,assignees,comments,url
    parameters:
      - *repo
      - *issue_id

  - name: gh_issue_create
    description: Create a new issue
    group: gh_issue
    access: write
    timeout: 15
    command: >
      gh issue create --repo {{repo}}
      --title "{{title}}"
      --body "{{body}}"
      {{#if labels}}--label {{labels}}{{/if}}
      {{#if assignees}}--assignee {{assignees}}{{/if}}
    parameters:
      - *repo
      - name: title
        type: string
      - name: body
        type: string
      - name: labels
        type: string
        default: ""
      - name: assignees
        type: string
        default: ""
    validation:
      require_confirm: true

# ── CI / RUNS ───────────────────────────────────────────────────────────────

  - name: gh_run_list
    description: List recent workflow runs
    group: gh_ci
    access: read
    timeout: 10
    command: >
      gh run list --repo {{repo}} --limit {{limit}}
      --json databaseId,status,conclusion,workflowName,headBranch,createdAt,url
    parameters:
      - *repo
      - name: limit
        type: integer
        default: 20

  - name: gh_run_view
    description: Inspect a workflow run
    group: gh_ci
    access: read
    timeout: 10
    command: "gh run view {{run_id}} --repo {{repo}}"
    parameters:
      - *repo
      - *run_id

  - name: gh_run_rerun
    description: Re-run failed jobs in a workflow run
    group: gh_ci
    access: write
    timeout: 15
    command: "gh run rerun {{run_id}} --repo {{repo}} --failed"
    parameters:
      - *repo
      - *run_id
    validation:
      require_confirm: true


# ── WORKFLOWS ───────────────────────────────────────────────────────────────

  - name: gh_workflow_list
    description: List workflows in a repository
    group: gh_workflow
    access: read
    timeout: 10
    command: "gh workflow list --repo {{repo}} --json id,name,state,path"
    parameters:
      - *repo

  - name: gh_workflow_run
    description: Trigger a workflow
    group: gh_workflow
    access: write
    timeout: 30
    command: "gh workflow run {{workflow}} --repo {{repo}} --ref {{ref}}"
    parameters:
      - *repo
      - name: workflow
        type: string
      - name: ref
        type: string
        default: main
    validation:
      require_confirm: true


# ── REPO ───────────────────────────────────────────────────────────────────

  - name: gh_repo_view
    description: Get repository metadata
    group: gh_repo
    access: read
    timeout: 10
    command: >
      gh repo view {{repo}}
      --json name,owner,description,url,defaultBranchRef,
             stargazerCount,primaryLanguage,isPrivate
    parameters:
      - *repo

  - name: gh_repo_list
    description: List repositories for a user/org
    group: gh_repo
    access: read
    timeout: 10
    command: >
      gh repo list {{owner}} --limit {{limit}}
      --json name,description,url,isPrivate,primaryLanguage,updatedAt
    parameters:
      - name: owner
        type: string
      - name: limit
        type: integer
        default: 20

# ── SEARCH ─────────────────────────────────────────────────────────────────

  - name: gh_search
    description: Search GitHub (repos, issues, prs, code)
    group: gh_search
    access: read
    timeout: 15
    command: "gh search {{type}} {{query}} --limit {{limit}} --json {{fields}}"
    parameters:
      - name: type
        type: string
      - name: query
        type: string
      - name: limit
        type: integer
        default: 10
      - name: fields
        type: string
        default: ""

# ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: gh_passthrough
    description: Run arbitrary gh commands not covered by tools
    group: gh_passthrough
    access: admin
    timeout: 60
    command: "gh {{args}}"
    parameters:
      - name: args
        type: string
    validation:
      require_confirm: true
