name: wrangler
type: cli
enabled: false
access_level: admin
description: >
  Cloudflare developer platform — deploy Workers and Pages, manage KV and R2
  storage, and configure DNS records via the Wrangler CLI.
capabilities:
  - edge_deployment
  - serverless_functions
  - edge_storage
  - dns_management
version: 1.0.0
instructions: |
  wrangler must be installed and available on PATH.
  Authenticate by setting CLOUDFLARE_API_TOKEN in ~/.onlyagents/.env.
  Workers projects require a wrangler.toml in the project root.
  Pages projects can be deployed from a build output directory.
  Pass working_dir to target a specific project root.
requires:
  bins:
    - name: wrangler
      install:
        brew: brew install cloudflare-wrangler
        manual: https://developers.cloudflare.com/workers/wrangler/install-and-update/
  env:
    - CLOUDFLARE_API_TOKEN

groups:
  wrangler_workers: "Deploy and manage Cloudflare Workers — dev, deploy, delete, tail logs"
  wrangler_pages: "Deploy and manage Cloudflare Pages projects"
  wrangler_kv: "Manage Workers KV namespaces and key-value entries"
  wrangler_r2: "Manage R2 object storage buckets"
  wrangler_dns: "Manage DNS records for Cloudflare zones"
  wrangler_passthrough: "Escape hatch — run any wrangler command not covered by named tools"

_params:
  working_dir: &working_dir
    name: working_dir
    type: string
    description: Path to project root (wrangler.toml)

tools:

  # ── WORKERS ────────────────────────────────────────────────────────────────

  - name: wrangler_dev
    description: Start local dev server
    group: wrangler_workers
    access: write
    timeout: 600
    exec:
      command: wrangler
      args: ["dev", "--port", "{{port}}"]
    parameters:
      - name: port
        type: integer
        default: 8787

  - name: wrangler_deploy
    description: Deploy Worker
    group: wrangler_workers
    access: write
    timeout: 120
    exec:
      command: wrangler
      args: ["deploy"]
    parameters: []

  - name: wrangler_workers_list
    description: List Workers
    group: wrangler_workers
    access: read
    exec:
      command: wrangler
      args: ["workers", "list"]
    parameters: []

  - name: wrangler_tail
    description: Stream Worker logs
    group: wrangler_workers
    access: read
    timeout: 300
    exec:
      command: wrangler
      args: ["tail", "{{name}}"]
    parameters:
      - name: name
        type: string

  - name: wrangler_worker_delete
    description: Delete Worker
    group: wrangler_workers
    access: admin
    exec:
      command: wrangler
      args: ["delete", "{{name}}"]
    parameters:
      - name: name
        type: string
    validation:
      require_confirm: true

  # ── PAGES ──────────────────────────────────────────────────────────────────

  - name: wrangler_pages_list
    description: List Pages projects
    group: wrangler_pages
    access: read
    exec:
      command: wrangler
      args: ["pages", "project", "list"]
    parameters: []

  - name: wrangler_pages_deploy
    description: Deploy Pages project
    group: wrangler_pages
    access: write
    timeout: 180
    exec:
      command: wrangler
      args:
        - "pages"
        - "deploy"
        - "{{directory}}"
        - "--project-name"
        - "{{project}}"
    parameters:
      - name: directory
        type: string
      - name: project
        type: string

  - name: wrangler_pages_deploy_branch
    description: Deploy Pages to specific branch
    group: wrangler_pages
    access: write
    timeout: 180
    exec:
      command: wrangler
      args:
        - "pages"
        - "deploy"
        - "{{directory}}"
        - "--project-name"
        - "{{project}}"
        - "--branch"
        - "{{branch}}"
    parameters:
      - name: directory
        type: string
      - name: project
        type: string
      - name: branch
        type: string

  - name: wrangler_pages_deployments_list
    description: List deployments
    group: wrangler_pages
    access: read
    exec:
      command: wrangler
      args:
        - "pages"
        - "deployment"
        - "list"
        - "--project-name"
        - "{{project}}"
    parameters:
      - name: project
        type: string

  # ── KV ─────────────────────────────────────────────────────────────────────

  - name: wrangler_kv_namespace_list
    description: List KV namespaces
    group: wrangler_kv
    access: read
    exec:
      command: wrangler
      args: ["kv", "namespace", "list"]
    parameters: []

  - name: wrangler_kv_get
    description: Get KV value
    group: wrangler_kv
    access: read
    exec:
      command: wrangler
      args:
        - "kv"
        - "key"
        - "get"
        - "{{key}}"
        - "--namespace-id"
        - "{{namespace_id}}"
    parameters:
      - name: namespace_id
        type: string
      - name: key
        type: string

  - name: wrangler_kv_put
    description: Put KV value
    group: wrangler_kv
    access: write
    exec:
      command: wrangler
      args:
        - "kv"
        - "key"
        - "put"
        - "{{key}}"
        - "{{value}}"
        - "--namespace-id"
        - "{{namespace_id}}"
    parameters:
      - name: namespace_id
        type: string
      - name: key
        type: string
      - name: value
        type: string

  - name: wrangler_kv_put_ttl
    description: Put KV value with TTL
    group: wrangler_kv
    access: write
    exec:
      command: wrangler
      args:
        - "kv"
        - "key"
        - "put"
        - "{{key}}"
        - "{{value}}"
        - "--namespace-id"
        - "{{namespace_id}}"
        - "--ttl"
        - "{{ttl}}"
    parameters:
      - name: namespace_id
        type: string
      - name: key
        type: string
      - name: value
        type: string
      - name: ttl
        type: integer

  - name: wrangler_kv_delete
    description: Delete KV key
    group: wrangler_kv
    access: admin
    exec:
      command: wrangler
      args:
        - "kv"
        - "key"
        - "delete"
        - "{{key}}"
        - "--namespace-id"
        - "{{namespace_id}}"
    parameters:
      - name: namespace_id
        type: string
      - name: key
        type: string
    validation:
      require_confirm: true

  # ── R2 ─────────────────────────────────────────────────────────────────────

  - name: wrangler_r2_buckets_list
    description: List R2 buckets
    group: wrangler_r2
    access: read
    exec:
      command: wrangler
      args: ["r2", "bucket", "list"]
    parameters: []

  - name: wrangler_r2_bucket_create
    description: Create R2 bucket
    group: wrangler_r2
    access: write
    exec:
      command: wrangler
      args: ["r2", "bucket", "create", "{{name}}"]
    parameters:
      - name: name
        type: string

  - name: wrangler_r2_bucket_delete
    description: Delete R2 bucket
    group: wrangler_r2
    access: admin
    exec:
      command: wrangler
      args: ["r2", "bucket", "delete", "{{name}}"]
    parameters:
      - name: name
        type: string
    validation:
      require_confirm: true

  # ── DNS ────────────────────────────────────────────────────────────────────

  - name: wrangler_dns_list
    description: List DNS records
    group: wrangler_dns
    access: read
    exec:
      command: wrangler
      args: ["dns", "record", "list", "--zone", "{{zone}}"]
    parameters:
      - name: zone
        type: string

  - name: wrangler_dns_add
    description: Add DNS record
    group: wrangler_dns
    access: write
    exec:
      command: wrangler
      args:
        - "dns"
        - "record"
        - "create"
        - "--zone"
        - "{{zone}}"
        - "--type"
        - "{{type}}"
        - "--name"
        - "{{name}}"
        - "--content"
        - "{{content}}"
    parameters:
      - name: zone
        type: string
      - name: type
        type: string
      - name: name
        type: string
      - name: content
        type: string

  - name: wrangler_dns_delete
    description: Delete DNS record
    group: wrangler_dns
    access: admin
    exec:
      command: wrangler
      args:
        - "dns"
        - "record"
        - "delete"
        - "--zone"
        - "{{zone}}"
        - "--id"
        - "{{record_id}}"
    parameters:
      - name: zone
        type: string
      - name: record_id
        type: string
    validation:
      require_confirm: true

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: wrangler_run
    description: Run arbitrary wrangler command (last resort)
    group: wrangler_passthrough
    access: admin
    exec:
      command: wrangler
      args: ["{{args}}"]
    parameters:
      - name: args
        type: string
    validation:
      require_confirm: true
