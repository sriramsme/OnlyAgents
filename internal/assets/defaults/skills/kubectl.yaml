name: kubectl
type: cli
enabled: false
access_level: admin
description: >
  Kubernetes cluster operations — inspecting workloads, applying manifests,
  managing rollouts, and interacting with pods. For local container operations
  use the docker skill instead.
capabilities:
  - kubernetes
  - workload_management
  - cluster_management
  - deployment_operations
version: 1.0.0
instructions: |
  kubectl must be installed and a valid kubeconfig must exist at ~/.kube/config or via KUBECONFIG env var.
  All tools accept a namespace param; leave empty to use the current context default namespace.
  kubectl_delete group tools require confirmation before execution.
  kubectl_exec requires the target pod to be in Running state.
requires:
  bins:
    - name: kubectl
      install:
        brew: brew install kubectl
        apt: sudo apt install kubectl
        manual: https://kubernetes.io/docs/tasks/tools/

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  kubectl_inspect: "Read cluster state — get, describe, logs, top, events, and explain resources"
  kubectl_apply: "Create and update resources — apply manifests, patch, scale, label, and exec into pods"
  kubectl_rollout: "Manage rollout lifecycle — status, history, undo, restart deployments, and port-forward"
  kubectl_delete: "Delete cluster resources — destructive and irreversible"
  kubectl_context: "Manage kubeconfig contexts — list, switch, and inspect the active context"
  kubectl_passthrough: "Escape hatch — run any kubectl subcommand not covered by named tools"

_params:
  namespace: &namespace
    name: namespace
    type: string
    description: Kubernetes namespace

  resource: &resource
    name: resource
    type: string
    description: Resource type (pod, deployment, service, etc.)

  name: &name
    name: name
    type: string
    description: Resource name

tools:

  # ── INSPECT ────────────────────────────────────────────────────────────────

  - name: kubectl_get
    description: Get resources in a namespace
    group: kubectl_inspect
    access: read
    exec:
      command: kubectl
      args: ["get", "{{resource}}", "-n", "{{namespace}}", "-o", "wide"]
    parameters:
      - *resource
      - *namespace

  - name: kubectl_get_all_namespaces
    description: Get resources across all namespaces
    group: kubectl_inspect
    access: read
    exec:
      command: kubectl
      args: ["get", "{{resource}}", "--all-namespaces", "-o", "wide"]
    parameters:
      - *resource

  - name: kubectl_get_one
    description: Get a specific resource
    group: kubectl_inspect
    access: read
    exec:
      command: kubectl
      args: ["get", "{{resource}}", "{{name}}", "-n", "{{namespace}}", "-o", "yaml"]
    parameters:
      - *resource
      - *name
      - *namespace

  - name: kubectl_describe
    description: Describe a resource
    group: kubectl_inspect
    access: read
    exec:
      command: kubectl
      args: ["describe", "{{resource}}", "{{name}}", "-n", "{{namespace}}"]
    parameters:
      - *resource
      - *name
      - *namespace

  - name: kubectl_logs
    description: Get pod logs
    group: kubectl_inspect
    access: read
    exec:
      command: kubectl
      args: ["logs", "{{name}}", "-n", "{{namespace}}", "--tail", "{{lines}}"]
    parameters:
      - *name
      - *namespace
      - name: lines
        type: integer
        description: Number of lines
        default: 100

  - name: kubectl_logs_previous
    description: Get previous logs (crashed container)
    group: kubectl_inspect
    access: read
    exec:
      command: kubectl
      args: ["logs", "{{name}}", "-n", "{{namespace}}", "--previous"]
    parameters:
      - *name
      - *namespace

  - name: kubectl_events
    description: Get namespace events
    group: kubectl_inspect
    access: read
    exec:
      command: kubectl
      args: ["get", "events", "-n", "{{namespace}}", "--sort-by=.lastTimestamp"]
    parameters:
      - *namespace

  - name: kubectl_top_pods
    description: Pod resource usage
    group: kubectl_inspect
    access: read
    exec:
      command: kubectl
      args: ["top", "pods", "-n", "{{namespace}}"]
    parameters:
      - *namespace

  - name: kubectl_top_nodes
    description: Node resource usage
    group: kubectl_inspect
    access: read
    exec:
      command: kubectl
      args: ["top", "nodes"]
    parameters: []

  # ── APPLY ──────────────────────────────────────────────────────────────────

  - name: kubectl_apply
    description: Apply manifest
    group: kubectl_apply
    access: write
    exec:
      command: kubectl
      args: ["apply", "-f", "{{manifest}}", "-n", "{{namespace}}"]
    parameters:
      - name: manifest
        type: string
      - *namespace

  - name: kubectl_apply_dry_run
    description: Validate manifest (dry run)
    group: kubectl_apply
    access: read
    exec:
      command: kubectl
      args: ["apply", "-f", "{{manifest}}", "--dry-run=client"]
    parameters:
      - name: manifest
        type: string

  - name: kubectl_scale
    description: Scale resource
    group: kubectl_apply
    access: write
    exec:
      command: kubectl
      args:
        - "scale"
        - "{{resource}}"
        - "{{name}}"
        - "--replicas"
        - "{{replicas}}"
        - "-n"
        - "{{namespace}}"
    parameters:
      - *resource
      - *name
      - *namespace
      - name: replicas
        type: integer

  - name: kubectl_exec
    description: Execute command in pod
    group: kubectl_apply
    access: write
    exec:
      command: kubectl
      args:
        - "exec"
        - "{{name}}"
        - "-n"
        - "{{namespace}}"
        - "--"
        - "{{command}}"
    parameters:
      - *name
      - *namespace
      - name: command
        type: string

  # ── ROLLOUT ────────────────────────────────────────────────────────────────

  - name: kubectl_rollout_status
    description: Check rollout status
    group: kubectl_rollout
    access: read
    exec:
      command: kubectl
      args:
        - "rollout"
        - "status"
        - "{{resource}}"
        - "{{name}}"
        - "-n"
        - "{{namespace}}"
    parameters:
      - *resource
      - *name
      - *namespace

  - name: kubectl_rollout_restart
    description: Restart deployment
    group: kubectl_rollout
    access: write
    exec:
      command: kubectl
      args:
        - "rollout"
        - "restart"
        - "{{resource}}"
        - "{{name}}"
        - "-n"
        - "{{namespace}}"
    parameters:
      - *resource
      - *name
      - *namespace

  - name: kubectl_rollout_undo
    description: Rollback deployment
    group: kubectl_rollout
    access: admin
    exec:
      command: kubectl
      args:
        - "rollout"
        - "undo"
        - "{{resource}}"
        - "{{name}}"
        - "-n"
        - "{{namespace}}"
    parameters:
      - *resource
      - *name
      - *namespace
    validation:
      require_confirm: true

  # ── DELETE ─────────────────────────────────────────────────────────────────

  - name: kubectl_delete
    description: Delete resource
    group: kubectl_delete
    access: admin
    exec:
      command: kubectl
      args:
        - "delete"
        - "{{resource}}"
        - "{{name}}"
        - "-n"
        - "{{namespace}}"
    parameters:
      - *resource
      - *name
      - *namespace
    validation:
      require_confirm: true

  - name: kubectl_delete_force
    description: Force delete resource
    group: kubectl_delete
    access: admin
    exec:
      command: kubectl
      args:
        - "delete"
        - "{{resource}}"
        - "{{name}}"
        - "-n"
        - "{{namespace}}"
        - "--force"
        - "--grace-period=0"
    parameters:
      - *resource
      - *name
      - *namespace
    validation:
      require_confirm: true

  # ── CONTEXT ────────────────────────────────────────────────────────────────

  - name: kubectl_get_contexts
    description: List contexts
    group: kubectl_context
    access: read
    exec:
      command: kubectl
      args: ["config", "get-contexts"]
    parameters: []

  - name: kubectl_current_context
    description: Current context
    group: kubectl_context
    access: read
    exec:
      command: kubectl
      args: ["config", "current-context"]
    parameters: []

  - name: kubectl_use_context
    description: Switch context
    group: kubectl_context
    access: write
    exec:
      command: kubectl
      args: ["config", "use-context", "{{context}}"]
    parameters:
      - name: context
        type: string

  # ── PASSTHROUGH (STRICT) ───────────────────────────────────────────────────

  - name: kubectl_run
    description: Run arbitrary kubectl command (last resort)
    group: kubectl_passthrough
    access: admin
    exec:
      command: kubectl
      args: ["{{args}}"]
    parameters:
      - name: args
        type: string
    validation:
      require_confirm: true
