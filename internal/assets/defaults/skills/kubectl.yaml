name: kubectl
type: cli
enabled: false
access_level: admin
has_groups: true
description: >
  Kubernetes cluster operations — inspecting workloads, applying manifests,
  managing rollouts, and interacting with pods. For local container operations
  use the docker skill instead.
capabilities:
  - kubernetes
  - workload_management
  - cluster_management
  - deployment_operations
version: 1.0.0
instructions: |
  kubectl must be installed and a valid kubeconfig must exist at ~/.kube/config or via KUBECONFIG env var.
  All tools accept a namespace param; leave empty to use the current context default namespace.
  kubectl_delete group tools require confirmation before execution.
  kubectl_exec requires the target pod to be in Running state.
requires:
  bins:
    - name: kubectl
      install:
        brew: brew install kubectl
        apt: sudo apt install kubectl
        manual: https://kubernetes.io/docs/tasks/tools/

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  kubectl_inspect: "Read cluster state — get, describe, logs, top, events, and explain resources"
  kubectl_apply: "Create and update resources — apply manifests, patch, scale, label, and exec into pods"
  kubectl_rollout: "Manage rollout lifecycle — status, history, undo, restart deployments, and port-forward"
  kubectl_delete: "Delete cluster resources — destructive and irreversible"
  kubectl_context: "Manage kubeconfig contexts — list, switch, and inspect the active context"
  kubectl_passthrough: "Escape hatch — run any kubectl subcommand not covered by named tools"

# ─────────────────────────────────────────────────────────────────────────────
# VALIDATION ANCHORS
# ─────────────────────────────────────────────────────────────────────────────
_validation_defaults:
  read: &read
    allowed_commands: [kubectl]
    denied_patterns: ["rm -rf", "$(", "`", "&&", "||", ";", ">", ">>"]
    max_output_size: 102400
  write: &write
    allowed_commands: [kubectl]
    denied_patterns: ["rm -rf", "$(", "`", "&&", "||", ";", ">", ">>"]
    max_output_size: 102400
  destructive: &destructive
    allowed_commands: [kubectl]
    denied_patterns: ["rm -rf", "$(", "`", "&&", "||", ";", ">", ">>"]
    max_output_size: 102400
    require_confirm: true

_params:
  namespace: &namespace
    name: namespace
    type: string
    description: Kubernetes namespace. Leave empty to use the current context default.
    default: ""
  resource: &resource
    name: resource
    type: string
    description: Resource type (e.g. pod, deployment, service, configmap, statefulset).
  resource_name: &resource_name
    name: name
    type: string
    description: Resource name. Leave empty to target all resources of the given type.
    default: ""

tools:
  # ── INSPECT ────────────────────────────────────────────────────────────────

  - name: kubectl_get
    description: List or get resources of a given type. Pass all_namespaces=true to span the whole cluster.
    group: kubectl_inspect
    access: read
    timeout: 15
    command: "kubectl get {{resource}} {{name}} {{#if namespace}}-n {{namespace}}{{/if}} {{#if all_namespaces}}--all-namespaces{{/if}} -o wide"
    parameters:
      - *resource
      - *resource_name
      - *namespace
      - name: all_namespaces
        type: boolean
        description: List resources across all namespaces.
        default: false
    validation: *read

  - name: kubectl_describe
    description: Show detailed state, configuration, and recent events for a specific resource.
    group: kubectl_inspect
    access: read
    timeout: 15
    command: "kubectl describe {{resource}} {{name}} {{#if namespace}}-n {{namespace}}{{/if}}"
    parameters:
      - *resource
      - *resource_name
      - *namespace
    validation: *read

  - name: kubectl_logs
    description: Fetch logs from a pod or a specific container within a pod. Use previous=true to inspect a crashed container.
    group: kubectl_inspect
    access: read
    timeout: 30
    command: "kubectl logs {{name}} {{#if container}}-c {{container}}{{/if}} {{#if namespace}}-n {{namespace}}{{/if}} --tail={{tail}} {{#if previous}}--previous{{/if}}"
    parameters:
      - *resource_name
      - *namespace
      - name: container
        type: string
        description: Container name within the pod. Leave empty for the default container.
        default: ""
      - name: tail
        type: integer
        description: Number of lines from the end of the log to show.
        default: 100
      - name: previous
        type: boolean
        description: Print logs for the previous instance of a crashed container.
        default: false
    validation: *read

  - name: kubectl_top_pods
    description: Show CPU and memory usage for pods. Pass all_namespaces=true for a cluster-wide view.
    group: kubectl_inspect
    access: read
    timeout: 15
    command: "kubectl top pods {{#if namespace}}-n {{namespace}}{{/if}} {{#if all_namespaces}}--all-namespaces{{/if}}"
    parameters:
      - *namespace
      - name: all_namespaces
        type: boolean
        description: Show resource usage across all namespaces.
        default: false
    validation: *read

  - name: kubectl_top_nodes
    description: Show CPU and memory usage for all cluster nodes.
    group: kubectl_inspect
    access: read
    timeout: 15
    command: "kubectl top nodes"
    parameters: []
    validation: *read

  - name: kubectl_events
    description: List recent events in a namespace, optionally filtered to a specific resource.
    group: kubectl_inspect
    access: read
    timeout: 15
    command: "kubectl get events {{#if namespace}}-n {{namespace}}{{/if}} {{#if for_resource}}--field-selector involvedObject.name={{for_resource}}{{/if}} --sort-by='.lastTimestamp'"
    parameters:
      - *namespace
      - name: for_resource
        type: string
        description: Filter events to a specific resource name. Leave empty for all events in the namespace.
        default: ""
    validation: *read

  - name: kubectl_explain
    description: Show API documentation for a resource type or a specific field path within it.
    group: kubectl_inspect
    access: read
    timeout: 10
    command: "kubectl explain {{resource}}{{#if field}}.{{field}}{{/if}}"
    parameters:
      - *resource
      - name: field
        type: string
        description: Dot-notation field path to explain (e.g. spec.containers). Leave empty for the resource root.
        default: ""
    validation: *read

  # ── APPLY ──────────────────────────────────────────────────────────────────

  - name: kubectl_apply
    description: Apply a manifest file or directory to the cluster. Creates or updates matching resources. Use dry_run=true to validate without changing state.
    group: kubectl_apply
    access: write
    timeout: 60
    command: "kubectl apply -f {{manifest}} {{#if namespace}}-n {{namespace}}{{/if}} {{#if dry_run}}--dry-run=client{{/if}}"
    parameters:
      - name: manifest
        type: string
        description: Path to a YAML/JSON manifest file or directory.
      - *namespace
      - name: dry_run
        type: boolean
        description: Validate the manifest client-side without applying changes.
        default: false
    validation: *write

  - name: kubectl_patch
    description: Update a specific field on a resource using a strategic merge, JSON merge, or JSON patch.
    group: kubectl_apply
    access: write
    timeout: 30
    command: "kubectl patch {{resource}} {{name}} {{#if namespace}}-n {{namespace}}{{/if}} --patch '{{patch}}' --type={{patch_type}}"
    parameters:
      - *resource
      - *resource_name
      - *namespace
      - name: patch
        type: string
        description: Patch content as a JSON or YAML string.
      - name: patch_type
        type: string
        description: Patch strategy — strategic, merge, or json.
        default: "strategic"
    validation: *write

  - name: kubectl_scale
    description: Scale a deployment, statefulset, or replicaset to a target replica count.
    group: kubectl_apply
    access: write
    timeout: 30
    command: "kubectl scale {{resource}} {{name}} --replicas={{replicas}} {{#if namespace}}-n {{namespace}}{{/if}}"
    parameters:
      - *resource
      - *resource_name
      - *namespace
      - name: replicas
        type: integer
        description: Desired number of replicas.
    validation: *write

  - name: kubectl_label
    description: Add or update labels on a resource. Pass overwrite=true to replace existing label values.
    group: kubectl_apply
    access: write
    timeout: 15
    command: "kubectl label {{resource}} {{name}} {{labels}} {{#if namespace}}-n {{namespace}}{{/if}} {{#if overwrite}}--overwrite{{/if}}"
    parameters:
      - *resource
      - *resource_name
      - *namespace
      - name: labels
        type: string
        description: Space-separated key=value label pairs (e.g. "env=prod tier=frontend").
      - name: overwrite
        type: boolean
        description: Allow overwriting existing label values.
        default: false
    validation: *write

  - name: kubectl_exec
    description: Execute a command inside a running container. For interactive sessions use the passthrough tool instead.
    group: kubectl_apply
    access: write
    timeout: 60
    command: "kubectl exec {{name}} {{#if namespace}}-n {{namespace}}{{/if}} {{#if container}}-c {{container}}{{/if}} -- {{exec_command}}"
    parameters:
      - *resource_name
      - *namespace
      - name: container
        type: string
        description: Container name within the pod. Leave empty for the default container.
        default: ""
      - name: exec_command
        type: string
        description: Command to run inside the container (e.g. "ls /app" or "env").
    validation: *write

  # ── ROLLOUT ────────────────────────────────────────────────────────────────

  - name: kubectl_rollout_status
    description: Watch the rollout status of a deployment, daemonset, or statefulset until complete.
    group: kubectl_rollout
    access: read
    timeout: 120
    command: "kubectl rollout status {{resource}} {{name}} {{#if namespace}}-n {{namespace}}{{/if}}"
    parameters:
      - *resource
      - *resource_name
      - *namespace
    validation: *read

  - name: kubectl_rollout_history
    description: View rollout revision history for a deployment. Pass revision to inspect a specific version.
    group: kubectl_rollout
    access: read
    timeout: 15
    command: "kubectl rollout history {{resource}} {{name}} {{#if namespace}}-n {{namespace}}{{/if}} {{#if revision}}--revision={{revision}}{{/if}}"
    parameters:
      - *resource
      - *resource_name
      - *namespace
      - name: revision
        type: string
        description: Specific revision number to inspect. Leave empty to list all revisions.
        default: ""
    validation: *read

  - name: kubectl_rollout_undo
    description: Roll back a deployment, daemonset, or statefulset to the previous or a named revision.
    group: kubectl_rollout
    access: write
    timeout: 60
    command: "kubectl rollout undo {{resource}} {{name}} {{#if namespace}}-n {{namespace}}{{/if}} {{#if to_revision}}--to-revision={{to_revision}}{{/if}}"
    parameters:
      - *resource
      - *resource_name
      - *namespace
      - name: to_revision
        type: string
        description: Revision number to roll back to. Leave empty to roll back to the previous revision.
        default: ""
    validation: *write

  - name: kubectl_restart
    description: Trigger a rolling restart of a deployment, daemonset, or statefulset without changing its spec.
    group: kubectl_rollout
    access: write
    timeout: 30
    command: "kubectl rollout restart {{resource}} {{name}} {{#if namespace}}-n {{namespace}}{{/if}}"
    parameters:
      - *resource
      - *resource_name
      - *namespace
    validation: *write

  - name: kubectl_port_forward
    description: Forward a local port to a port on a pod or service for local debugging.
    group: kubectl_rollout
    access: write
    timeout: 300
    command: "kubectl port-forward {{resource_type}}/{{name}} {{local_port}}:{{remote_port}} {{#if namespace}}-n {{namespace}}{{/if}}"
    parameters:
      - *namespace
      - name: resource_type
        type: string
        description: Resource type to forward to — pod or svc.
        default: "pod"
      - *resource_name
      - name: local_port
        type: integer
        description: Local port to bind.
      - name: remote_port
        type: integer
        description: Port on the pod or service to forward to.
    validation: *write

  # ── DELETE ─────────────────────────────────────────────────────────────────

  - name: kubectl_delete
    description: Delete one or more resources by name, label selector, or manifest file. Force-delete skips graceful termination.
    group: kubectl_delete
    access: admin
    timeout: 60
    command: "kubectl delete {{resource}} {{#if name}}{{name}}{{/if}} {{#if namespace}}-n {{namespace}}{{/if}} {{#if selector}}-l {{selector}}{{/if}} {{#if manifest}}-f {{manifest}}{{/if}} {{#if force}}--force --grace-period=0{{/if}}"
    parameters:
      - *resource
      - *resource_name
      - *namespace
      - name: selector
        type: string
        description: Label selector to target multiple resources (e.g. "app=nginx"). Leave empty to target by name.
        default: ""
      - name: manifest
        type: string
        description: Path to a manifest file — deletes all resources defined in it. Leave empty to delete by name or selector.
        default: ""
      - name: force
        type: boolean
        description: Force delete without waiting for graceful termination. Irreversible.
        default: false
    validation: *destructive

  # ── CONTEXT ────────────────────────────────────────────────────────────────

  - name: kubectl_get_contexts
    description: List all kubeconfig contexts with their cluster, user, and default namespace.
    group: kubectl_context
    access: read
    timeout: 10
    command: "kubectl config get-contexts"
    parameters: []
    validation: *read

  - name: kubectl_current_context
    description: Show the currently active kubeconfig context.
    group: kubectl_context
    access: read
    timeout: 10
    command: "kubectl config current-context"
    parameters: []
    validation: *read

  - name: kubectl_use_context
    description: Switch the active kubeconfig context.
    group: kubectl_context
    access: write
    timeout: 10
    command: "kubectl config use-context {{context}}"
    parameters:
      - name: context
        type: string
        description: Name of the context to activate (use kubectl_get_contexts to list available contexts).
    validation: *write

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: kubectl_passthrough
    description: Run any kubectl subcommand not covered by the named tools. Use as a last resort when no specific tool fits.
    group: kubectl_passthrough
    access: admin
    timeout: 60
    command: "kubectl {{args}}"
    parameters:
      - name: args
        type: string
        description: Full argument string to pass directly to kubectl (e.g. "get nodes -o json" or "auth can-i create pods").
    validation:
      allowed_commands: [kubectl]
      denied_patterns: ["rm -rf", "$(", "`", "&&", "||", ";", ">", ">>"]
      max_output_size: 102400
      require_confirm: true
