name: firebase
type: cli
enabled: false
access_level: admin
description: >
  Firebase project management — deploying hosting, functions, and rules,
  managing preview channels, inspecting logs, and running the local emulator suite.
capabilities:
  - project_management
  - hosting
  - serverless_functions
  - local_development
version: 1.0.0
instructions: |
  firebase CLI must be installed and available on PATH.
  Authenticate by setting FIREBASE_TOKEN in ~/.onlyagents/.env for non-interactive use,
  or run firebase login interactively before use.
  Most commands operate in a project directory containing a firebase.json file.
  Pass working_dir to target a specific project root.
  Set the active project with firebase_use before running deploy or emulator commands.
requires:
  bins:
    - name: firebase
      install:
        brew: brew install firebase-cli
        manual: https://firebase.google.com/docs/cli#install_the_firebase_cli
  env:
    - FIREBASE_TOKEN

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  firebase_project: "Manage projects and apps — list projects, switch active project, list registered apps"
  firebase_deploy: "Deploy hosting, functions, rules, and indexes to Firebase — full or partial targets"
  firebase_functions: "Inspect and manage deployed functions — list, stream logs, and delete"
  firebase_hosting: "Manage hosting sites and preview channels — list, open, and delete channels"
  firebase_emulators: "Run the local emulator suite — start, export, and import emulator data"
  firebase_passthrough: "Escape hatch — run any firebase CLI command not covered by named tools"

_params:
  working_dir: &working_dir
    name: working_dir
    type: string
    description: Path to the project root containing firebase.json. Leave empty for current working directory.
    default: ""
  project: &project
    name: project
    type: string
    description: Firebase project ID to target. Leave empty to use the currently active project.
    default: ""

tools:

  # ── PROJECT ────────────────────────────────────────────────────────────────

  - name: firebase_projects_list
    description: List all Firebase projects in the authenticated account.
    group: firebase_project
    access: read
    timeout: 15
    exec:
      command: firebase
      args: ["projects:list", "--config", "{{working_dir}}/firebase.json"]
    parameters:
      - *working_dir
    validation:
      max_output_size: 102400

  - name: firebase_use
    description: Set the active Firebase project.
    group: firebase_project
    access: write
    timeout: 10
    exec:
      command: firebase
      args: ["use", "{{project}}", "--config", "{{working_dir}}/firebase.json"]
    parameters:
      - *working_dir
      - name: project
        type: string
    validation:
      max_output_size: 102400

  - name: firebase_apps_list
    description: List all registered apps.
    group: firebase_project
    access: read
    timeout: 15
    exec:
      command: firebase
      args: ["apps:list", "--project", "{{project}}", "--config", "{{working_dir}}/firebase.json"]
    parameters:
      - *working_dir
      - *project
    validation:
      max_output_size: 102400

  # ── DEPLOY ─────────────────────────────────────────────────────────────────

  - name: firebase_deploy
    description: Deploy to Firebase.
    group: firebase_deploy
    access: write
    timeout: 300
    exec:
      command: firebase
      args:
        - "deploy"
        - "--only"
        - "{{targets}}"
        - "--message"
        - "{{message}}"
        - "--project"
        - "{{project}}"
        - "--config"
        - "{{working_dir}}/firebase.json"
    parameters:
      - *working_dir
      - *project
      - name: targets
        type: string
      - name: message
        type: string
    validation:
      max_output_size: 102400

  - name: firebase_deploy_preview
    description: Deploy hosting to preview channel.
    group: firebase_deploy
    access: write
    timeout: 120
    exec:
      command: firebase
      args:
        - "hosting:channel:deploy"
        - "{{channel}}"
        - "--expires"
        - "{{expires}}"
        - "--project"
        - "{{project}}"
        - "--config"
        - "{{working_dir}}/firebase.json"
    parameters:
      - *working_dir
      - *project
      - name: channel
        type: string
      - name: expires
        type: string
    validation:
      max_output_size: 102400

  # ── FUNCTIONS ──────────────────────────────────────────────────────────────

  - name: firebase_functions_list
    description: List deployed Cloud Functions.
    group: firebase_functions
    access: read
    timeout: 15
    exec:
      command: firebase
      args: ["functions:list", "--project", "{{project}}", "--config", "{{working_dir}}/firebase.json"]
    parameters:
      - *working_dir
      - *project
    validation:
      max_output_size: 102400

  - name: firebase_functions_log
    description: Fetch function logs.
    group: firebase_functions
    access: read
    timeout: 30
    exec:
      command: firebase
      args:
        - "functions:log"
        - "--only"
        - "{{name}}"
        - "--lines"
        - "{{lines}}"
        - "--project"
        - "{{project}}"
        - "--config"
        - "{{working_dir}}/firebase.json"
    parameters:
      - *working_dir
      - *project
      - name: name
        type: string
      - name: lines
        type: integer
    validation:
      max_output_size: 102400

  - name: firebase_functions_delete
    description: Delete Cloud Functions.
    group: firebase_functions
    access: admin
    timeout: 60
    exec:
      command: firebase
      args:
        - "functions:delete"
        - "{{names}}"
        - "--region"
        - "{{region}}"
        - "--force"
        - "--project"
        - "{{project}}"
        - "--config"
        - "{{working_dir}}/firebase.json"
    parameters:
      - *working_dir
      - *project
      - name: names
        type: string
      - name: region
        type: string
    validation:
      max_output_size: 102400
      require_confirm: true

  # ── HOSTING ────────────────────────────────────────────────────────────────

  - name: firebase_hosting_sites_list
    description: List hosting sites.
    group: firebase_hosting
    access: read
    timeout: 15
    exec:
      command: firebase
      args: ["hosting:sites:list", "--project", "{{project}}", "--config", "{{working_dir}}/firebase.json"]
    parameters:
      - *working_dir
      - *project
    validation:
      max_output_size: 102400

  - name: firebase_hosting_channel_list
    description: List preview channels.
    group: firebase_hosting
    access: read
    timeout: 15
    exec:
      command: firebase
      args:
        - "hosting:channel:list"
        - "--site"
        - "{{site}}"
        - "--project"
        - "{{project}}"
        - "--config"
        - "{{working_dir}}/firebase.json"
    parameters:
      - *working_dir
      - *project
      - name: site
        type: string
    validation:
      max_output_size: 102400

  - name: firebase_hosting_channel_delete
    description: Delete preview channel.
    group: firebase_hosting
    access: admin
    timeout: 15
    exec:
      command: firebase
      args:
        - "hosting:channel:delete"
        - "{{channel}}"
        - "--force"
        - "--site"
        - "{{site}}"
        - "--project"
        - "{{project}}"
        - "--config"
        - "{{working_dir}}/firebase.json"
    parameters:
      - *working_dir
      - *project
      - name: channel
        type: string
      - name: site
        type: string
    validation:
      max_output_size: 102400
      require_confirm: true

  - name: firebase_open
    description: Open Firebase service.
    group: firebase_hosting
    access: read
    timeout: 10
    exec:
      command: firebase
      args:
        - "open"
        - "{{service}}"
        - "--project"
        - "{{project}}"
        - "--config"
        - "{{working_dir}}/firebase.json"
    parameters:
      - *working_dir
      - *project
      - name: service
        type: string
    validation:
      max_output_size: 102400

  # ── EMULATORS ──────────────────────────────────────────────────────────────

  - name: firebase_emulators_start
    description: Start emulator suite.
    group: firebase_emulators
    access: write
    timeout: 600
    exec:
      command: firebase
      args:
        - "emulators:start"
        - "--only"
        - "{{services}}"
        - "--import"
        - "{{import_dir}}"
        - "--export-on-exit"
        - "{{export_on_exit}}"
        - "--project"
        - "{{project}}"
        - "--config"
        - "{{working_dir}}/firebase.json"
    parameters:
      - *working_dir
      - *project
      - name: services
        type: string
      - name: import_dir
        type: string
      - name: export_on_exit
        type: string
    validation:
      max_output_size: 102400

  - name: firebase_emulators_export
    description: Export emulator data.
    group: firebase_emulators
    access: write
    timeout: 30
    exec:
      command: firebase
      args:
        - "emulators:export"
        - "{{export_dir}}"
        - "--force"
        - "--config"
        - "{{working_dir}}/firebase.json"
    parameters:
      - *working_dir
      - name: export_dir
        type: string
    validation:
      max_output_size: 102400

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: firebase_passthrough
    description: Run arbitrary firebase CLI command.
    group: firebase_passthrough
    access: admin
    timeout: 60
    exec:
      command: firebase
      args: ["{{args}}", "--config", "{{working_dir}}/firebase.json"]
    parameters:
      - *working_dir
      - name: args
        type: string
    validation:
      max_output_size: 102400
      require_confirm: true
