name: filesystem
type: cli
enabled: true
access_level: admin
has_groups: true
description: >
  Local filesystem operations — create, read, move, copy, delete, and search
  files and directories. Foundation skill required by most other skills.
capabilities:
  - file_management
  - directory_management
  - file_search
version: 1.0.0
instructions: |
  Standard Unix utilities must be available on PATH — ls, cat, mkdir, touch,
  cp, mv, rm, find, stat, echo, printf, head, tail, wc, chmod are expected on
  any Linux or macOS system and require no installation.
  All relative paths resolve against the agent working directory.
  Destructive tools (fs_delete group) require confirmation before execution.
requires: {}

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  fs_read: "Read file and directory contents — cat, head, tail, list, stat, and line count"
  fs_write: "Create and write files and directories — touch, mkdir, write, and append"
  fs_organize: "Move, copy, and rename files and directories"
  fs_search: "Search for files by name, type, size, or modification time"
  fs_delete: "Delete files and directories — destructive and irreversible"
  fs_passthrough: "Escape hatch — run any filesystem operation not covered by named tools"

# ─────────────────────────────────────────────────────────────────────────────
# VALIDATION ANCHORS
# ─────────────────────────────────────────────────────────────────────────────
# Note: > and >> are intentionally allowed — writing file content is the
# core purpose of this skill. The executor-level safety net blocks truly
# dangerous operations (rm -rf /, fork bombs, mkfs) regardless.
_validation_defaults:
  read: &read
    allowed_commands: [ls, cat, head, tail, stat, wc, echo, printf, file]
    denied_patterns: ["$(", "`", "rm -rf"]
    max_output_size: 102400
  write: &write
    allowed_commands: [mkdir, touch, echo, printf, tee, cp, mv, chmod, ln]
    denied_patterns: ["$(", "`", "rm -rf"]
    max_output_size: 102400
  search: &search
    allowed_commands: [find, ls]
    denied_patterns: ["$(", "`", "rm -rf"]
    max_output_size: 102400
  destructive: &destructive
    allowed_commands: [rm]
    denied_patterns: ["$(", "`", "rm -rf /", "rm -rf /*"]
    max_output_size: 102400
    require_confirm: true

_params:
  path: &path
    name: path
    type: string
    description: Absolute or relative path to the target file or directory.

tools:
  # ── READ ───────────────────────────────────────────────────────────────────

  - name: fs_list
    description: List files and directories at a path. Pass long=true for permissions, size, and modification time.
    group: fs_read
    access: read
    timeout: 10
    command: "ls {{#if long}}-lah{{else}}-1{{/if}} {{#if all}}--almost-all{{/if}} '{{path}}'"
    parameters:
      - *path
      - name: long
        type: boolean
        description: Show detailed listing with permissions, size, owner, and modification time.
        default: false
      - name: all
        type: boolean
        description: Include hidden files and directories (dotfiles).
        default: false
    validation: *read

  - name: fs_cat
    description: Print the full contents of a file to stdout.
    group: fs_read
    access: read
    timeout: 10
    command: "cat '{{path}}'"
    parameters:
      - *path
    validation: *read

  - name: fs_head
    description: Print the first N lines of a file. Useful for previewing large files without reading everything.
    group: fs_read
    access: read
    timeout: 10
    command: "head -n {{lines}} '{{path}}'"
    parameters:
      - *path
      - name: lines
        type: integer
        description: Number of lines to print from the start of the file.
        default: 20
    validation: *read

  - name: fs_tail
    description: Print the last N lines of a file. Useful for checking logs or recently appended content.
    group: fs_read
    access: read
    timeout: 10
    command: "tail -n {{lines}} '{{path}}'"
    parameters:
      - *path
      - name: lines
        type: integer
        description: Number of lines to print from the end of the file.
        default: 20
    validation: *read

  - name: fs_stat
    description: Show metadata for a file or directory — size, permissions, owner, and modification time.
    group: fs_read
    access: read
    timeout: 10
    command: "stat '{{path}}'"
    parameters:
      - *path
    validation: *read

  - name: fs_wc
    description: Count lines, words, and bytes in a file. Useful for gauging file size before reading.
    group: fs_read
    access: read
    timeout: 10
    command: "wc {{#if lines_only}}-l{{else}}-lwc{{/if}} '{{path}}'"
    parameters:
      - *path
      - name: lines_only
        type: boolean
        description: Return only the line count.
        default: false
    validation: *read

  # ── WRITE ──────────────────────────────────────────────────────────────────

  - name: fs_mkdir
    description: Create a directory and any missing parent directories.
    group: fs_write
    access: write
    timeout: 10
    command: "mkdir -p '{{path}}'"
    parameters:
      - *path
    validation: *write

  - name: fs_touch
    description: Create an empty file, or update the modification timestamp of an existing file.
    group: fs_write
    access: write
    timeout: 10
    command: "touch '{{path}}'"
    parameters:
      - *path
    validation: *write

  - name: fs_write
    description: Write content to a file, replacing any existing content. Creates the file and parent directories if they do not exist.
    group: fs_write
    access: write
    timeout: 15
    command: 'mkdir -p "$(dirname ''{{path}}'')" && printf ''%s'' ''{{content}}'' > ''{{path}}'''
    parameters:
      - *path
      - name: content
        type: string
        description: Content to write to the file.
    validation: *write

  - name: fs_append
    description: Append content to the end of a file. Creates the file if it does not exist.
    group: fs_write
    access: write
    timeout: 15
    command: "printf '%s' '{{content}}' >> '{{path}}'"
    parameters:
      - *path
      - name: content
        type: string
        description: Content to append to the file.
    validation: *write

  - name: fs_chmod
    description: Change the permissions of a file or directory.
    group: fs_write
    access: write
    timeout: 10
    command: "chmod {{#if recursive}}-R{{/if}} {{mode}} '{{path}}'"
    parameters:
      - *path
      - name: mode
        type: string
        description: Permission mode in octal (e.g. 755, 644) or symbolic (e.g. +x, u+rw) format.
      - name: recursive
        type: boolean
        description: Apply permissions recursively to all contents of a directory.
        default: false
    validation: *write

  - name: fs_symlink
    description: Create a symbolic link pointing to a target path.
    group: fs_write
    access: write
    timeout: 10
    command: "ln -s '{{target}}' '{{link_path}}'"
    parameters:
      - name: target
        type: string
        description: Path the symlink should point to.
      - name: link_path
        type: string
        description: Path where the symlink itself will be created.
    validation: *write

  # ── ORGANIZE ───────────────────────────────────────────────────────────────

  - name: fs_copy
    description: Copy a file or directory to a destination. Pass recursive=true for directories.
    group: fs_organize
    access: write
    timeout: 30
    command: "cp {{#if recursive}}-r{{/if}} '{{source}}' '{{destination}}'"
    parameters:
      - name: source
        type: string
        description: Path to the source file or directory.
      - name: destination
        type: string
        description: Destination path. If a directory, the source is copied inside it.
      - name: recursive
        type: boolean
        description: Copy directories recursively.
        default: false
    validation: *write

  - name: fs_move
    description: Move or rename a file or directory.
    group: fs_organize
    access: write
    timeout: 15
    command: "mv '{{source}}' '{{destination}}'"
    parameters:
      - name: source
        type: string
        description: Path to the source file or directory.
      - name: destination
        type: string
        description: Destination path or new name.
    validation: *write

  # ── SEARCH ─────────────────────────────────────────────────────────────────

  - name: fs_find
    description: Find files or directories by name pattern, type, or modification time.
    group: fs_search
    access: read
    timeout: 30
    command: "find '{{path}}' {{#if type}}-type {{type}}{{/if}} {{#if name}}-name '{{name}}'{{/if}} {{#if newer_than}}-newer '{{newer_than}}'{{/if}} {{#if max_depth}}-maxdepth {{max_depth}}{{/if}}"
    parameters:
      - *path
      - name: type
        type: string
        description: Filter by type — f for files, d for directories, l for symlinks. Leave empty for all.
        default: ""
      - name: name
        type: string
        description: Filename glob pattern to match (e.g. "*.go", "config.*", ".env*"). Leave empty to match all names.
        default: ""
      - name: newer_than
        type: string
        description: Return only entries modified more recently than this file path. Leave empty to skip.
        default: ""
      - name: max_depth
        type: integer
        description: Maximum directory depth to descend into. Leave at 0 for unlimited.
        default: 0
    validation: *search

  - name: fs_find_by_size
    description: Find files larger or smaller than a given size threshold.
    group: fs_search
    access: read
    timeout: 30
    command: "find '{{path}}' -type f -size {{operator}}{{size}}{{unit}}"
    parameters:
      - *path
      - name: size
        type: integer
        description: Size threshold as a number.
      - name: unit
        type: string
        description: Unit for the size — c (bytes), k (kilobytes), M (megabytes), G (gigabytes).
        default: "M"
      - name: operator
        type: string
        description: Comparison operator — + for larger than, - for smaller than.
        default: "+"
    validation: *search

  # ── DELETE ─────────────────────────────────────────────────────────────────

  - name: fs_delete
    description: Delete a file or directory. Pass recursive=true to delete a non-empty directory and all its contents. Irreversible.
    group: fs_delete
    access: admin
    timeout: 15
    command: "rm {{#if recursive}}-r{{/if}} -f '{{path}}'"
    parameters:
      - *path
      - name: recursive
        type: boolean
        description: Delete a directory and all its contents recursively. Irreversible.
        default: false
    validation: *destructive

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: fs_passthrough
    description: Run any filesystem operation not covered by named tools — for tar, zip, rsync, or complex find expressions.
    group: fs_passthrough
    access: admin
    timeout: 60
    command: "{{command}}"
    parameters:
      - name: command
        type: string
        description: Full shell command to execute (e.g. "tar -czf archive.tar.gz ./src" or "rsync -av src/ dest/").
    validation:
      allowed_commands: [tar, zip, unzip, rsync, ln, du, df, file]
      denied_patterns: ["$(", "`", "rm -rf /", "rm -rf /*"]
      max_output_size: 102400
      require_confirm: true
