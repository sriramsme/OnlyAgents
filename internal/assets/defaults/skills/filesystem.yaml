name: filesystem
type: cli
enabled: true
access_level: admin
description: >
  Local filesystem operations — create, read, move, copy, delete, and search
  files and directories. Foundation skill required by most other skills.
capabilities:
  - file_management
  - directory_management
  - file_search
version: 1.0.0
instructions: |
  Standard Unix utilities must be available on PATH — ls, cat, mkdir, touch,
  cp, mv, rm, find, stat, echo, printf, head, tail, wc, chmod are expected on
  any Linux or macOS system and require no installation.
  All relative paths resolve against the agent working directory.
  Destructive tools (fs_delete group) require confirmation before execution.
requires: {}

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  fs_read: "Read file and directory contents — cat, head, tail, list, stat, and line count"
  fs_write: "Create and write files and directories — touch, mkdir, write, and append"
  fs_organize: "Move, copy, and rename files and directories"
  fs_search: "Search for files by name, type, size, or modification time"
  fs_delete: "Delete files and directories — destructive and irreversible"
  fs_passthrough: "Escape hatch — run any filesystem operation not covered by named tools"

_params:
  path: &path
    name: path
    type: string
    description: Absolute or relative path to the target file or directory.

tools:

  # ── READ ───────────────────────────────────────────────────────────────────

  - name: fs_list
    description: List files and directories at a path.
    group: fs_read
    access: read
    timeout: 10
    exec:
      command: ls
      args: ["{{flags}}", "{{path}}"]
    parameters:
      - *path
      - name: flags
        type: string
        description: Flags for ls (e.g. "-lah", "-1", "--almost-all")
        default: "-1"

  - name: fs_cat
    description: Print the full contents of a file to stdout.
    group: fs_read
    access: read
    timeout: 10
    exec:
      command: cat
      args: ["{{path}}"]
    parameters:
      - *path

  - name: fs_head
    description: Print the first N lines of a file.
    group: fs_read
    access: read
    timeout: 10
    exec:
      command: head
      args: ["-n", "{{lines}}", "{{path}}"]
    parameters:
      - *path
      - name: lines
        type: integer
        default: 20

  - name: fs_tail
    description: Print the last N lines of a file.
    group: fs_read
    access: read
    timeout: 10
    exec:
      command: tail
      args: ["-n", "{{lines}}", "{{path}}"]
    parameters:
      - *path
      - name: lines
        type: integer
        default: 20

  - name: fs_stat
    description: Show metadata for a file or directory.
    group: fs_read
    access: read
    timeout: 10
    exec:
      command: stat
      args: ["{{path}}"]
    parameters:
      - *path

  - name: fs_wc
    description: Count lines, words, and bytes in a file.
    group: fs_read
    access: read
    timeout: 10
    exec:
      command: wc
      args: ["{{flags}}", "{{path}}"]
    parameters:
      - *path
      - name: flags
        type: string
        description: wc flags (e.g. "-l", "-lwc")
        default: "-lwc"

  # ── WRITE ──────────────────────────────────────────────────────────────────

  - name: fs_mkdir
    description: Create a directory and any missing parent directories.
    group: fs_write
    access: write
    timeout: 10
    exec:
      command: mkdir
      args: ["-p", "{{path}}"]
    parameters:
      - *path

  - name: fs_touch
    description: Create an empty file or update timestamp.
    group: fs_write
    access: write
    timeout: 10
    exec:
      command: touch
      args: ["{{path}}"]
    parameters:
      - *path

  - name: fs_write
    description: Write content to a file (overwrite).
    group: fs_write
    access: write
    timeout: 15
    exec:
      command: tee
      args: ["{{path}}"]
      stdin_param: content
    parameters:
      - *path
      - name: content
        type: string

  - name: fs_append
    description: Append content to a file.
    group: fs_write
    access: write
    timeout: 15
    exec:
      command: tee
      args: ["-a", "{{path}}"]
      stdin_param: content
    parameters:
      - *path
      - name: content
        type: string

  - name: fs_chmod
    description: Change permissions of a file or directory.
    group: fs_write
    access: write
    timeout: 10
    exec:
      command: chmod
      args: ["{{flags}}", "{{mode}}", "{{path}}"]
    parameters:
      - *path
      - name: mode
        type: string
      - name: flags
        type: string
        description: e.g. "-R" for recursive
        default: ""

  - name: fs_symlink
    description: Create a symbolic link.
    group: fs_write
    access: write
    timeout: 10
    exec:
      command: ln
      args: ["-s", "{{target}}", "{{link_path}}"]
    parameters:
      - name: target
        type: string
      - name: link_path
        type: string

  # ── ORGANIZE ───────────────────────────────────────────────────────────────

  - name: fs_copy
    description: Copy a file or directory.
    group: fs_organize
    access: write
    timeout: 30
    exec:
      command: cp
      args: ["{{flags}}", "{{source}}", "{{destination}}"]
    parameters:
      - name: source
        type: string
      - name: destination
        type: string
      - name: flags
        type: string
        description: e.g. "-r" for recursive
        default: ""

  - name: fs_move
    description: Move or rename a file or directory.
    group: fs_organize
    access: write
    timeout: 15
    exec:
      command: mv
      args: ["{{source}}", "{{destination}}"]
    parameters:
      - name: source
        type: string
      - name: destination
        type: string

  # ── SEARCH ─────────────────────────────────────────────────────────────────

  - name: fs_find
    description: Find files or directories.
    group: fs_search
    access: read
    timeout: 30
    exec:
      command: find
      args: ["{{path}}", "{{options}}"]
    parameters:
      - *path
      - name: options
        type: string
        description: Additional find options (e.g. "-type f -name '*.go'")
        default: ""

  - name: fs_find_by_size
    description: Find files by size threshold.
    group: fs_search
    access: read
    timeout: 30
    exec:
      command: find
      args: ["{{path}}", "-type", "f", "-size", "{{operator}}{{size}}{{unit}}"]
    parameters:
      - *path
      - name: size
        type: integer
      - name: unit
        type: string
        default: "M"
      - name: operator
        type: string
        default: "+"

  # ── DELETE ─────────────────────────────────────────────────────────────────

  - name: fs_delete
    description: Delete a file or directory.
    group: fs_delete
    access: admin
    timeout: 15
    exec:
      command: rm
      args: ["{{flags}}", "{{path}}"]
    parameters:
      - *path
      - name: flags
        type: string
        description: e.g. "-r -f"
        default: "-f"
    validation:
      require_confirm: true

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: fs_passthrough
    description: Run arbitrary filesystem command (limited binaries).
    group: fs_passthrough
    access: admin
    timeout: 60
    exec:
      command: "{{command}}"
      args: ["{{args}}"]
    parameters:
      - name: command
        type: string
      - name: args
        type: string
    validation:
      require_confirm: true
