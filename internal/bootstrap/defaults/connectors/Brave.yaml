# Brave Search Connector Configuration

enabled: false
max_results: 5 # Default number of results

# DO NOT EDIT BELOW THIS LINE
# -----------------------------
platform: brave
name: Brave
description: >
  Brave is a search engine that helps you find information faster.
  It's a great way to find answers to your questions.

instructions: >
  To get started, you'll need to get an API key from Brave.
  1. Go to https://brave.com/search/api/
  2. Sign up for a free account
  3. Go to the "API Keys" section
  4. Copy the API key
  5. Store it in your vault (e.g., .env file)

vault_paths:
  api_key:
    path: brave/api_key
    prompt: Brave API key
