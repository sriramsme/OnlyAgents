# Perplexity AI Search Connector Configuration

enabled: false # Enable if you have a Perplexity API key
max_results: 5 # Default number of results
model: "sonar" # Perplexity model to use

# DO NOT EDIT BELOW THIS LINE
# -----------------------------
id: perplexity
name: Perplexity
description: >
  Perplexity is a search engine that helps you find information faster.
  It's a great way to find answers to your questions.

instructions: >
  To get started, you'll need to get an API key from Perplexity.
  1. Go to https://www.perplexity.ai/
  2. Sign up for a free account
  3. Go to the "API Keys" section
  4. Copy the API key
  5. Store it in your vault (e.g., .env file)

vault_paths:
  api_key:
    path: perplexity/api_key
    prompt: Perplexity API key
