name: weather
type: cli
enabled: true
access_level: read
description: Get current weather, forecasts, and historical weather data
version: 1.0.0
instructions: |
  1. Install curl: https://curl.se/download.html
  2. You don't need API keys or any additional setup.
capabilities:
  - weather
  - forecasting
  - geolocation
requires:
  bins:
    - curl
  env: []
security:
  sanitized: true
  sanitized_at: 2026-03-13T00:00:00Z
  sanitized_by: converter
tools:
  - name: wttr_current
    description: Get quick one-line weather for a location
    access: read
    timeout: 10
    command: 'curl -s "wttr.in/{{location}}?format=3"'
    parameters:
      - name: location
        type: string
        description: City name, airport code, or coordinates
  - name: wttr_forecast
    description: Get full terminal forecast
    access: read
    timeout: 15
    command: 'curl -s "wttr.in/{{location}}?T"'
    parameters:
      - name: location
        type: string
        description: City name or coordinates
  - name: open_meteo_current
    description: Get current weather using coordinates (JSON output)
    access: read
    timeout: 10
    command: 'curl -s "https://api.open-meteo.com/v1/forecast?latitude={{latitude}}&longitude={{longitude}}&current_weather=true"'
    parameters:
      - name: latitude
        type: number
        description: Latitude coordinate
      - name: longitude
        type: number
        description: Longitude coordinate
    validation:
      allowed_commands:
        - curl
      denied_patterns:
        - "rm -rf"
        - "sudo"
      max_output_size: 102400
