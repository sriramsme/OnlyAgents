name: ripgrep
type: cli
enabled: true
access_level: read
has_groups: true
description: >
  Fast code and text search across files and directories — pattern matching,
  file filtering, and structured output for agent-friendly consumption.
capabilities:
  - code_search
  - text_search
  - file_discovery
version: 1.0.0
instructions: |
  rg (ripgrep) must be installed and available on PATH.
  All tools accept a path param — a file, directory, or glob. Defaults to current working directory.
  ripgrep respects .gitignore and .rgignore files by default. Pass no_ignore=true to override.
requires:
  bins:
    - name: rg
      install:
        brew: brew install ripgrep
        apt: sudo apt install ripgrep
        manual: https://github.com/BurntSushi/ripgrep#installation

# ─────────────────────────────────────────────────────────────────────────────
# GROUPS
# ─────────────────────────────────────────────────────────────────────────────
groups:
  rg_search: "Search file contents by pattern — basic, case-insensitive, word-boundary, and multiline"
  rg_filter: "Scope search by file type, glob, or directory depth"
  rg_output: "Control output format — count only, filenames only, context lines, and JSON"
  rg_passthrough: "Escape hatch — run any rg invocation not covered by named tools"

# ─────────────────────────────────────────────────────────────────────────────
# VALIDATION ANCHOR
# ─────────────────────────────────────────────────────────────────────────────
_validation_defaults:
  read: &read
    allowed_commands: [rg]
    denied_patterns: ["$(", "`", "&&", "||", ";", ">", ">>"]
    max_output_size: 102400

_params:
  path: &path
    name: path
    type: string
    description: File, directory, or glob to search. Leave empty for current working directory.
    default: ""
  no_ignore: &no_ignore
    name: no_ignore
    type: boolean
    description: Ignore .gitignore and .rgignore rules and search all files.
    default: false
  hidden: &hidden
    name: hidden
    type: boolean
    description: Include hidden files and directories (dotfiles).
    default: false

tools:
  # ── SEARCH ─────────────────────────────────────────────────────────────────

  - name: rg_search
    description: Search for a pattern in files. The core tool — use this first. Supports fixed strings and regular expressions.
    group: rg_search
    access: read
    timeout: 30
    command: "rg {{#if fixed_string}}-F{{/if}} {{#if ignore_case}}-i{{/if}} {{#if no_ignore}}--no-ignore{{/if}} {{#if hidden}}--hidden{{/if}} '{{pattern}}' {{path}}"
    parameters:
      - name: pattern
        type: string
        description: Search pattern — regex by default. Set fixed_string=true for a literal string match.
      - *path
      - name: ignore_case
        type: boolean
        description: Case-insensitive matching.
        default: false
      - name: fixed_string
        type: boolean
        description: Treat the pattern as a literal string, not a regular expression.
        default: false
      - *no_ignore
      - *hidden
    validation: *read

  - name: rg_word
    description: Search for whole-word matches only. Equivalent to wrapping the pattern in word boundaries.
    group: rg_search
    access: read
    timeout: 30
    command: "rg -w {{#if ignore_case}}-i{{/if}} {{#if no_ignore}}--no-ignore{{/if}} {{#if hidden}}--hidden{{/if}} '{{pattern}}' {{path}}"
    parameters:
      - name: pattern
        type: string
        description: Word to search for. Matches only when surrounded by non-word characters.
      - *path
      - name: ignore_case
        type: boolean
        description: Case-insensitive matching.
        default: false
      - *no_ignore
      - *hidden
    validation: *read

  - name: rg_multiline
    description: Search for patterns that span multiple lines. Useful for finding function signatures, struct definitions, or multi-line blocks.
    group: rg_search
    access: read
    timeout: 30
    command: "rg -U {{#if ignore_case}}-i{{/if}} {{#if no_ignore}}--no-ignore{{/if}} {{#if hidden}}--hidden{{/if}} '{{pattern}}' {{path}}"
    parameters:
      - name: pattern
        type: string
        description: Multiline regex pattern. Use \n to match newlines (e.g. 'func \w+\([^)]*\)\s*\{').
      - *path
      - name: ignore_case
        type: boolean
        description: Case-insensitive matching.
        default: false
      - *no_ignore
      - *hidden
    validation: *read

  # ── FILTER ─────────────────────────────────────────────────────────────────

  - name: rg_by_type
    description: Search only files of a given type. Use rg_list_types via passthrough to see all supported type names.
    group: rg_filter
    access: read
    timeout: 30
    command: "rg -t {{file_type}} {{#if ignore_case}}-i{{/if}} {{#if no_ignore}}--no-ignore{{/if}} {{#if hidden}}--hidden{{/if}} '{{pattern}}' {{path}}"
    parameters:
      - name: pattern
        type: string
        description: Search pattern.
      - name: file_type
        type: string
        description: ripgrep type name to restrict search to (e.g. py, go, ts, js, rust, yaml, json, md).
      - *path
      - name: ignore_case
        type: boolean
        description: Case-insensitive matching.
        default: false
      - *no_ignore
      - *hidden
    validation: *read

  - name: rg_by_glob
    description: Search only files matching a glob pattern. More flexible than rg_by_type when targeting specific filenames or extensions.
    group: rg_filter
    access: read
    timeout: 30
    command: "rg -g '{{glob}}' {{#if ignore_case}}-i{{/if}} {{#if no_ignore}}--no-ignore{{/if}} {{#if hidden}}--hidden{{/if}} '{{pattern}}' {{path}}"
    parameters:
      - name: pattern
        type: string
        description: Search pattern.
      - name: glob
        type: string
        description: Glob pattern for filenames to include (e.g. '*.go', 'config*.yaml', '!vendor/**' to exclude).
      - *path
      - name: ignore_case
        type: boolean
        description: Case-insensitive matching.
        default: false
      - *no_ignore
      - *hidden
    validation: *read

  # ── OUTPUT ─────────────────────────────────────────────────────────────────

  - name: rg_count
    description: Return the number of matches per file rather than the matching lines. Useful for gauging how widespread a pattern is before reading results.
    group: rg_output
    access: read
    timeout: 30
    command: "rg -c {{#if ignore_case}}-i{{/if}} {{#if no_ignore}}--no-ignore{{/if}} {{#if hidden}}--hidden{{/if}} {{#if file_type}}-t {{file_type}}{{/if}} '{{pattern}}' {{path}}"
    parameters:
      - name: pattern
        type: string
        description: Search pattern.
      - *path
      - name: ignore_case
        type: boolean
        description: Case-insensitive matching.
        default: false
      - name: file_type
        type: string
        description: Restrict count to a ripgrep file type (e.g. go, py, ts). Leave empty to count across all files.
        default: ""
      - *no_ignore
      - *hidden
    validation: *read

  - name: rg_files
    description: List files containing at least one match — no line content. Useful when you need filenames to pass to other tools.
    group: rg_output
    access: read
    timeout: 30
    command: "rg -l {{#if ignore_case}}-i{{/if}} {{#if no_ignore}}--no-ignore{{/if}} {{#if hidden}}--hidden{{/if}} {{#if file_type}}-t {{file_type}}{{/if}} '{{pattern}}' {{path}}"
    parameters:
      - name: pattern
        type: string
        description: Search pattern.
      - *path
      - name: ignore_case
        type: boolean
        description: Case-insensitive matching.
        default: false
      - name: file_type
        type: string
        description: Restrict to a ripgrep file type. Leave empty for all files.
        default: ""
      - *no_ignore
      - *hidden
    validation: *read

  - name: rg_context
    description: Search with surrounding context lines. Useful for understanding matches without opening the file.
    group: rg_output
    access: read
    timeout: 30
    command: "rg -C {{context_lines}} {{#if ignore_case}}-i{{/if}} {{#if no_ignore}}--no-ignore{{/if}} {{#if hidden}}--hidden{{/if}} {{#if file_type}}-t {{file_type}}{{/if}} '{{pattern}}' {{path}}"
    parameters:
      - name: pattern
        type: string
        description: Search pattern.
      - *path
      - name: context_lines
        type: integer
        description: Number of lines to show before and after each match.
        default: 3
      - name: ignore_case
        type: boolean
        description: Case-insensitive matching.
        default: false
      - name: file_type
        type: string
        description: Restrict to a ripgrep file type. Leave empty for all files.
        default: ""
      - *no_ignore
      - *hidden
    validation: *read

  - name: rg_json
    description: Output matches as newline-delimited JSON. Useful for agent post-processing with jq or structured pipelines.
    group: rg_output
    access: read
    timeout: 30
    command: "rg --json {{#if ignore_case}}-i{{/if}} {{#if no_ignore}}--no-ignore{{/if}} {{#if hidden}}--hidden{{/if}} {{#if file_type}}-t {{file_type}}{{/if}} '{{pattern}}' {{path}}"
    parameters:
      - name: pattern
        type: string
        description: Search pattern.
      - *path
      - name: ignore_case
        type: boolean
        description: Case-insensitive matching.
        default: false
      - name: file_type
        type: string
        description: Restrict to a ripgrep file type. Leave empty for all files.
        default: ""
      - *no_ignore
      - *hidden
    validation: *read

  # ── PASSTHROUGH ────────────────────────────────────────────────────────────

  - name: rg_passthrough
    description: Run any rg invocation not covered by named tools — for advanced flags like --replace, --stats, --type-add, or --pre.
    group: rg_passthrough
    access: read
    timeout: 60
    command: "rg {{args}}"
    parameters:
      - name: args
        type: string
        description: Full argument string to pass directly to rg (e.g. "--stats -t go 'TODO' src/").
    validation: *read
