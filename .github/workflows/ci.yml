name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: web

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: web

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT_NAME=onlyagents-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi
          go build -v \
            -ldflags="-s -w -X 'github.com/sriramsme/OnlyAgents/cmd.version=$(git describe --tags --always --dirty)'" \
            -o $OUTPUT_NAME \
            ./cmd/onlyagents

      - name: Test CLI commands
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          ./onlyagents-linux-amd64 --help
          ./onlyagents-linux-amd64 models --help
          ./onlyagents-linux-amd64 agent --help
          ./onlyagents-linux-amd64 server --help

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: onlyagents-${{ matrix.goos }}-${{ matrix.goarch }}
          path: onlyagents-*
          retention-days: 7
